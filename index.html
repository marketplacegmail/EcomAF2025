    &lt;script&gt;
        function showMessage(message, isError = true) {
            const messageArea = document.getElementById(&#x27;messageArea&#x27;);
            messageArea.textContent = message;
            messageArea.className = &#x27;message &#x27; + (isError ? &#x27;error&#x27; : &#x27;success&#x27;);
            
            setTimeout(() =&gt; {
                messageArea.textContent = &#x27;&#x27;;
                messageArea.className = &#x27;&#x27;;
            }, 5000);
        }

        function getFormattedText(id) {
            const text = document.getElementById(id).value;
            if (!text) return &#x27;&lt;em style=&quot;color: var(--gray);&quot;&gt;Chưa có đánh giá&lt;/em&gt;&#x27;;
            return text.replace(/\n/g, &#x27;&lt;br&gt;&#x27;);
        }

        function previewData() {
            const liveDate = document.getElementById(&#x27;liveDate&#x27;).value;
            
            if (!liveDate) {
                showMessage(&#x27;❌ Vui lòng nhập ngày livestream!&#x27;);
                return;
            }

            // Thu thập dữ liệu sessions
            const sessions = [];
            for (let i = 1; i &lt;= 8; i++) {
                const roomId = document.getElementById(`roomId${i}`).value;
                const time = document.getElementById(`time${i}`).value;
                const hostName = document.getElementById(`hostName${i}`).value;
                const ldName = document.getElementById(`ldName${i}`).value;
                const follower = document.getElementById(`follower${i}`).value;
                const order = document.getElementById(`order${i}`).value;
                
                if (roomId || time || hostName || ldName || follower || order) {
                    sessions.push({
                        session: i,
                        roomId: roomId || &#x27;-&#x27;,
                        time: time ? new Date(time).toLocaleString(&#x27;vi-VN&#x27;) : &#x27;-&#x27;,
                        hostName: hostName || &#x27;-&#x27;,
                        ldName: ldName || &#x27;-&#x27;,
                        follower: follower || &#x27;0&#x27;,
                        order: order || &#x27;0&#x27;
                    });
                }
            }

            // Thu thập checklist
            const checklistItems = [
                { id: &#x27;scriptTheme&#x27;, text: &#x27;scriptThemeText&#x27;, name: &#x27;Chủ đề live&#x27; },
                { id: &#x27;aiScript&#x27;, text: null, name: &#x27;Tạo Kịch bản (AI)&#x27; },
                { id: &#x27;exclusiveDeal&#x27;, text: &#x27;exclusiveDealText&#x27;, name: &#x27;Deal độc quyền&#x27; },
                { id: &#x27;voucher&#x27;, text: &#x27;voucherText&#x27;, name: &#x27;Voucher&#x27; },
                { id: &#x27;discussScript&#x27;, text: null, name: &#x27;Thảo luận Kịch bản&#x27; },
                { id: &#x27;knowPromotion&#x27;, text: null, name: &#x27;Nắm Promotion&#x27; },
                { id: &#x27;costume&#x27;, text: null, name: &#x27;Trang phục&#x27; },
                { id: &#x27;background&#x27;, text: &#x27;backgroundText&#x27;, name: &#x27;Background&#x27; },
                { id: &#x27;taglineScheme&#x27;, text: null, name: &#x27;Tagline &amp; Scheme&#x27; },
                { id: &#x27;lighting&#x27;, text: null, name: &#x27;Ánh sáng&#x27; }
            ];

            // Cột trái: Thông tin chung + Bảng sessions
            const leftHTML = `
                &lt;div class=&quot;preview-section&quot;&gt;
                    &lt;h3&gt;📅 Thông Tin Chung&lt;/h3&gt;
                    &lt;div class=&quot;preview-item&quot;&gt;&lt;strong&gt;Ngày Livestream:&lt;/strong&gt; ${new Date(liveDate).toLocaleDateString(&#x27;vi-VN&#x27;)}&lt;/div&gt;
                    &lt;div class=&quot;preview-item&quot;&gt;&lt;strong&gt;Chủ đề Live:&lt;/strong&gt; ${document.getElementById(&#x27;scriptThemeText&#x27;).value || &#x27;-&#x27;}&lt;/div&gt;
                &lt;/div&gt;

                &lt;div class=&quot;preview-section&quot;&gt;
                    &lt;h3&gt;📋 Thông Tin Các Phiên&lt;/h3&gt;
                    ${sessions.length &gt; 0 ? `
                        &lt;table class=&quot;preview-table&quot;&gt;
                            &lt;thead&gt;
                                &lt;tr&gt;
                                    &lt;th&gt;S&lt;/th&gt;
                                    &lt;th&gt;Room ID&lt;/th&gt;
                                    &lt;th&gt;Time&lt;/th&gt;
                                    &lt;th&gt;Host&lt;/th&gt;
                                    &lt;th&gt;LD&lt;/th&gt;
                                    &lt;th&gt;Follow&lt;/th&gt;
                                    &lt;th&gt;Order&lt;/th&gt;
                                &lt;/tr&gt;
                            &lt;/thead&gt;
                            &lt;tbody&gt;
                                ${sessions.map(s =&gt; `
                                    &lt;tr&gt;
                                        &lt;td&gt;${s.session}&lt;/td&gt;
                                        &lt;td&gt;${s.roomId}&lt;/td&gt;
                                        &lt;td&gt;${s.time}&lt;/td&gt;
                                        &lt;td&gt;${s.hostName}&lt;/td&gt;
                                        &lt;td&gt;${s.ldName}&lt;/td&gt;
                                        &lt;td&gt;${s.follower}&lt;/td&gt;
                                        &lt;td&gt;${s.order}&lt;/td&gt;
                                    &lt;/tr&gt;
                                `).join(&#x27;&#x27;)}
                            &lt;/tbody&gt;
                        &lt;/table&gt;
                    ` : &#x27;&lt;div class=&quot;preview-item&quot;&gt;Chưa có dữ liệu phiên nào được nhập&lt;/div&gt;&#x27;}
                &lt;/div&gt;

                &lt;div class=&quot;preview-section&quot;&gt;
                    &lt;h3&gt;✅ Checklist (${checklistItems.filter(item =&gt; document.getElementById(item.id).checked).length}/${checklistItems.length})&lt;/h3&gt;
                    &lt;div class=&quot;checklist-preview&quot;&gt;
                        ${checklistItems.map(item =&gt; {
                            const checked = document.getElementById(item.id).checked;
                            const detail = item.text ? document.getElementById(item.text).value : &#x27;&#x27;;
                            return `
                                &lt;div class=&quot;checklist-preview-item ${checked ? &#x27;checked&#x27; : &#x27;&#x27;}&quot;&gt;
                                    &lt;span class=&quot;check-icon&quot;&gt;${checked ? &#x27;✓&#x27; : &#x27;○&#x27;}&lt;/span&gt;
                                    ${item.name}
                                    ${detail ? `&lt;br&gt;&lt;small style=&quot;color: var(--gray);&quot;&gt;${detail}&lt;/small&gt;` : &#x27;&#x27;}
                                &lt;/div&gt;
                            `;
                        }).join(&#x27;&#x27;)}
                    &lt;/div&gt;
                &lt;/div&gt;
            `;

            // Cột phải: Đánh giá sau phiên live
            const rightHTML = `
                &lt;div class=&quot;preview-section&quot;&gt;
                    &lt;h3&gt;📝 Đánh Giá Sau Phiên Live&lt;/h3&gt;
                    &lt;div class=&quot;preview-item&quot;&gt;
                        &lt;strong&gt;1. Kịch bản và hình thức:&lt;/strong&gt;&lt;br&gt;
                        ${getFormattedText(&#x27;script&#x27;)}
                    &lt;/div&gt;
                    &lt;div class=&quot;preview-item&quot;&gt;
                        &lt;strong&gt;2. Nhu cầu &amp; tương tác:&lt;/strong&gt;&lt;br&gt;
                        ${getFormattedText(&#x27;interaction&#x27;)}
                    &lt;/div&gt;
                    &lt;div class=&quot;preview-item&quot;&gt;
                        &lt;strong&gt;3. Chất lượng hình ảnh và âm thanh:&lt;/strong&gt;&lt;br&gt;
                        ${getFormattedText(&#x27;quality&#x27;)}
                    &lt;/div&gt;
                    &lt;div class=&quot;preview-item&quot;&gt;
                        &lt;strong&gt;4. Rút kinh nghiệm và cải thiện:&lt;/strong&gt;&lt;br&gt;
                        ${getFormattedText(&#x27;improvement&#x27;)}
                    &lt;/div&gt;
                &lt;/div&gt;
            `;

            document.getElementById(&#x27;previewColumnLeft&#x27;).innerHTML = leftHTML;
            document.getElementById(&#x27;previewColumnRight&#x27;).innerHTML = rightHTML;
            document.getElementById(&#x27;previewModal&#x27;).classList.add(&#x27;active&#x27;);
        }

        function closePreview() {
            document.getElementById(&#x27;previewModal&#x27;).classList.remove(&#x27;active&#x27;);
        }

        // Close modal khi click outside
        window.onclick = function(event) {
            const modal = document.getElementById(&#x27;previewModal&#x27;);
            if (event.target === modal) {
                closePreview();
            }
        }

        function sanitizeString(str) {
            if (!str) return &#x27;&#x27;;
            return str.replace(/[\x00-\x1F\x7F-\x9F]/g, &#x27;&#x27;)
                      .replace(/[\r\n]+/g, &#x27; &#x27;)
                      .trim();
        }

        function exportToExcel() {
            const liveDate = document.getElementById(&#x27;liveDate&#x27;).value;
            
            if (!liveDate) {
                showMessage(&#x27;❌ Vui lòng nhập ngày livestream!&#x27;);
                return;
            }

            const updateData = [];
            for (let i = 1; i &lt;= 8; i++) {

        }
    &lt;/style&gt;

&lt;body&gt;

                            &lt;/div&gt;
                            &lt;div class=&quot;product-item&quot;&gt;
                                &lt;label&gt;Sản phẩm 2:&lt;/label&gt;
                                &lt;textarea id=&quot;product2&quot; placeholder=&quot;Tên, giá, tính năng...&quot;&gt;&lt;/textarea&gt;
                            &lt;/div&gt;
                            &lt;div class=&quot;product-item&quot;&gt;
                                &lt;label&gt;Sản phẩm 3:&lt;/label&gt;
                                &lt;textarea id=&quot;product3&quot; placeholder=&quot;Tên, giá, tính năng...&quot;&gt;&lt;/textarea&gt;
                            &lt;/div&gt;
                            &lt;div class=&quot;product-item&quot;&gt;
                                &lt;label&gt;Sản phẩm 4:&lt;/label&gt;

            &lt;div class=&quot;output-section&quot;&gt;

                    &lt;button class=&quot;copy-btn&quot; onclick=&quot;copyScript()&quot; id=&quot;copyBtn&quot; disabled&gt;📋 Copy&lt;/button&gt;
                    &lt;button class=&quot;download-btn&quot; onclick=&quot;downloadScript()&quot; id=&quot;downloadBtn&quot; disabled&gt;📥 Tải DOCX&lt;/button&gt;
                &lt;/div&gt;

                &lt;div class=&quot;script-tabs&quot; id=&quot;scriptTabs&quot; style=&quot;display: none;&quot;&gt;
                    &lt;button class=&quot;tab-btn active&quot; onclick=&quot;showScript(1)&quot;&gt;Kịch bản 1&lt;/button&gt;
                    &lt;button class=&quot;tab-btn&quot; onclick=&quot;showScript(2)&quot;&gt;Kịch bản 2&lt;/button&gt;
                &lt;/div&gt;

                &lt;div class=&quot;script-output active&quot; id=&quot;script1&quot;&gt;
                    &lt;div class=&quot;empty-state&quot;&gt;
                        Kịch bản sẽ xuất hiện ở đây sau khi bạn điền thông tin và nhấn &quot;Tạo Kịch Bản AI&quot;
                    &lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;script-output&quot; id=&quot;script2&quot;&gt;&lt;/div&gt;
                &lt;div class=&quot;loading&quot; id=&quot;loading&quot;&gt;Gemini 2.5 Flash đang suy nghĩ vèo vèo...&lt;/div&gt;

            &lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;script&gt;
        let currentScript = 1;
        let selectedStyle = &#x27;friendly&#x27;;
        let scriptGenerationCount = 0;
        let scriptData = {
            script1: &#x27;&#x27;,
            script2: &#x27;&#x27;
        };

        // Style selection
        document.querySelectorAll(&#x27;.style-option&#x27;).forEach(option =&gt; {
            option.addEventListener(&#x27;click&#x27;, function() {
                document.querySelectorAll(&#x27;.style-option&#x27;).forEach(opt =&gt; opt.classList.remove(&#x27;selected&#x27;));
                this.classList.add(&#x27;selected&#x27;);
                selectedStyle = this.getAttribute(&#x27;data-style&#x27;);
            });
        });

        // Form submit
        document.getElementById(&#x27;scriptForm&#x27;).addEventListener(&#x27;submit&#x27;, function(e) {
            e.preventDefault();
            generateScript();
        });

        // Regenerate button
        document.getElementById(&#x27;regenerateBtn&#x27;).addEventListener(&#x27;click&#x27;, function() {
            generateScript(true);
        });

        function showScript(scriptNumber) {
            currentScript = scriptNumber;
            document.getElementById(&#x27;script1&#x27;).classList.remove(&#x27;active&#x27;);
            document.getElementById(&#x27;script2&#x27;).classList.remove(&#x27;active&#x27;);
            document.getElementById(&#x27;script&#x27; + scriptNumber).classList.add(&#x27;active&#x27;);
            document.querySelectorAll(&#x27;.tab-btn&#x27;).forEach(btn =&gt; btn.classList.remove(&#x27;active&#x27;));
            document.querySelectorAll(&#x27;.tab-btn&#x27;)[scriptNumber - 1].classList.add(&#x27;active&#x27;);
        }

        async function generateScript(isRegenerate = false) {
            const apiKey = document.getElementById(&#x27;apiKey&#x27;).value;
            const topic = document.getElementById(&#x27;topic&#x27;).value;
            const products = [
                document.getElementById(&#x27;product1&#x27;).value,
                document.getElementById(&#x27;product2&#x27;).value,
                document.getElementById(&#x27;product3&#x27;).value,
                document.getElementById(&#x27;product4&#x27;).value,
                document.getElementById(&#x27;product5&#x27;).value
            ].filter(p =&gt; p.trim());
            const seasonality = document.getElementById(&#x27;seasonality&#x27;).value;
            const gamification = document.getElementById(&#x27;gamification&#x27;).value;
            const tipsHacks = document.getElementById(&#x27;tipsHacks&#x27;).value;
            const brandStory = document.getElementById(&#x27;brandStory&#x27;).value;
            const policy = document.getElementById(&#x27;policy&#x27;).value;
            const cta = document.getElementById(&#x27;cta&#x27;).value;
            const promotion = document.getElementById(&#x27;promotion&#x27;).value;

            if (!apiKey) {
                showError(&#x27;Vui lòng nhập API Key của Google Gemini!&#x27;);
                return;
            }

            if (!topic || products.length === 0 || !brandStory || !policy || !cta || !promotion) {
                showError(&#x27;Vui lòng điền đầy đủ các trường bắt buộc: Chủ đề, ít nhất 1 sản phẩm, Brand Story, Policy, CTA và Promotion!&#x27;);
                return;
            }

            const loading = document.getElementById(&#x27;loading&#x27;);
            const scriptTabs = document.getElementById(&#x27;scriptTabs&#x27;);
            const generateBtn = document.getElementById(&#x27;generateBtn&#x27;);
            const regenerateBtn = document.getElementById(&#x27;regenerateBtn&#x27;);
            const copyBtn = document.getElementById(&#x27;copyBtn&#x27;);
            const downloadBtn = document.getElementById(&#x27;downloadBtn&#x27;);

            // Clear and show loading
            document.getElementById(&#x27;script1&#x27;).innerHTML = &#x27;&#x27;;
            document.getElementById(&#x27;script2&#x27;).innerHTML = &#x27;&#x27;;
            const emptyState = document.querySelector(&#x27;.empty-state&#x27;);
            if (emptyState) emptyState.style.display = &#x27;none&#x27;;
            document.getElementById(&#x27;errorMessage&#x27;).style.display = &#x27;none&#x27;;
            loading.style.display = &#x27;block&#x27;;
            scriptTabs.style.display = &#x27;none&#x27;;
            generateBtn.disabled = true;
            regenerateBtn.disabled = true;
            copyBtn.disabled = true;
            downloadBtn.disabled = true;
            generateBtn.textContent = isRegenerate ? &#x27;Đang tạo lại...&#x27; : &#x27;Đang tạo...&#x27;;

            try {
                scriptGenerationCount++;

                const [script1, script2] = await Promise.all([
                    generateScriptWithGemini(apiKey, topic, products, seasonality, gamification, tipsHacks, brandStory, policy, cta, promotion, selectedStyle, 1),
                    generateScriptWithGemini(apiKey, topic, products, seasonality, gamification, tipsHacks, brandStory, policy, cta, promotion, selectedStyle, 2)
                ]);

                scriptData.script1 = script1;
                scriptData.script2 = script2;

                document.getElementById(&#x27;script1&#x27;).innerHTML = &#x27;&lt;pre&gt;&#x27; + escapeHtml(scriptData.script1) + &#x27;&lt;/pre&gt;&#x27;;
                document.getElementById(&#x27;script2&#x27;).innerHTML = &#x27;&lt;pre&gt;&#x27; + escapeHtml(scriptData.script2) + &#x27;&lt;/pre&gt;&#x27;;

                scriptTabs.style.display = &#x27;flex&#x27;;
                showScript(1);
                loading.style.display = &#x27;none&#x27;;

                regenerateBtn.disabled = false;
                copyBtn.disabled = false;
                downloadBtn.disabled = false;

            } catch (error) {
                console.error(&#x27;Error:&#x27;, error);
                showError(&#x27;Lỗi khi tạo kịch bản: &#x27; + error.message);
                loading.style.display = &#x27;none&#x27;;
                const emptyState = document.querySelector(&#x27;.empty-state&#x27;);
                if (emptyState) emptyState.style.display = &#x27;block&#x27;;
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = &#x27;🚀 Tạo Kịch Bản AI&#x27;;
            }
        }

        async function generateScriptWithGemini(apiKey, topic, products, seasonality, gamification, tipsHacks, brandStory, policy, cta, promotion, style, version) {
            const styleDescriptions = {
                &#x27;friendly&#x27;: &#x27;thân thiện, dễ thương, gần gũi với khán giả&#x27;,
                &#x27;professional&#x27;: &#x27;chuyên nghiệp, lịch sự, tin cậy và thuyết phục&#x27;,
                &#x27;energetic&#x27;: &#x27;năng động, sôi nổi, tạo cảm giác khẩn cấp và thúc đẩy hành động&#x27;
            };
            const versionPrompts = {
                1: &#x27;Phiên bản 1: Tập trung vào xây dựng niềm tin và tương tác với khán giả&#x27;,
                2: &#x27;Phiên bản 2: Tập trung vào tạo urgency và thúc đẩy hành động mạnh mẽ&#x27;
            };
            const productList = products.map((p, i) =&gt; `SP${i + 1}: ${p}`).join(&#x27;\n&#x27;);

            const prompt = `Tạo kịch bản livestream 60 PHÚT hoàn chỉnh với yêu cầu:

CHỦ ĐỀ: ${topic}
PHONG CÁCH: ${styleDescriptions[style]}
${versionPrompts[version]}

SÀN PHẨM:
${productList}

SEASONALITY: ${seasonality || &#x27;Không&#x27;}
GAMIFICATION: ${gamification || &#x27;Không&#x27;}
TIP/HACK: ${tipsHacks || &#x27;Không&#x27;}
BRAND: ${brandStory}
POLICY: ${policy}
CTA: ${cta}
PROMOTION: ${promotion}

CẤU TRÚC KỊCH BẢN (60 phút):
1. KHAI MẠC (0-5 phút): Chào mừng, giới thiệu chủ đề
2. BRAND STORY (5-10 phút): Câu chuyện thương hiệu
3. SÀN PHẨM (10-35 phút): Trình bày chi tiết từng sản phẩm
4. SEASONALITY (35-40 phút): Nội dung theo mùa (nếu có)
5. GAMIFICATION (40-45 phút): Trò chơi tương tác (nếu có)
6. TIP/HACK (45-50 phút): Chia sẻ mẹo hữu ích (nếu có)
7. POLICY (50-53 phút): Chính sách bảo hành, đổi trả
8. PROMOTION &amp; CTA (53-58 phút): Khuyến mãi và kêu gọi đặt hàng
9. KẾT THÚC (58-60 phút): Tổng kết, cảm ơn

YÊU CẦU:
- Viết GỌN, SÚNG TÍCH nhưng ĐẦY ĐỦ tất cả phần
- Mỗi phần có timing rõ ràng
- Dialogue tự nhiên, phù hợp phong cách
- Tích hợp call-to-action xuyên suốt
- PHẢI có đầy đủ 9 phần từ KHAI MẠC đến KẾT THÚC
- Tổng thời lượng: 60 phút

Bắt đầu tạo kịch bản:`;

            // Updated API URL to use gemini-2.5-flash
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            const response = await fetch(apiUrl, {
                method: &#x27;POST&#x27;,
                headers: { &#x27;Content-Type&#x27;: &#x27;application/json&#x27; },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        temperature: 0.85,
                        topK: 40,
                        topP: 0.95,
                        maxOutputTokens: 8192
                    },
                    safetySettings: [
                        { category: &quot;HARM_CATEGORY_HARASSMENT&quot;, threshold: &quot;BLOCK_MEDIUM_AND_ABOVE&quot; },
                        { category: &quot;HARM_CATEGORY_HATE_SPEECH&quot;, threshold: &quot;BLOCK_MEDIUM_AND_ABOVE&quot; },
                        { category: &quot;HARM_CATEGORY_SEXUALLY_EXPLICIT&quot;, threshold: &quot;BLOCK_MEDIUM_AND_ABOVE&quot; },
                        { category: &quot;HARM_CATEGORY_DANGEROUS_CONTENT&quot;, threshold: &quot;BLOCK_MEDIUM_AND_ABOVE&quot; }
                    ]
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || &#x27;Lỗi khi gọi API Gemini&#x27;);
            }

            const data = await response.json();

            if (data.candidates &amp;&amp; data.candidates[0]) {
                const candidate = data.candidates[0];
                const finishReason = candidate.finishReason;

                if (finishReason === &#x27;MAX_TOKENS&#x27;) {
                    console.warn(&#x27;⚠️ Cảnh báo: Response bị cắt do đạt giới hạn token&#x27;);
                }

                if (candidate.content &amp;&amp; candidate.content.parts &amp;&amp; candidate.content.parts[0]) {
                    return candidate.content.parts[0].text;
                } else {
                    throw new Error(&#x27;Không nhận được nội dung từ Gemini AI&#x27;);
                }
            } else {
                throw new Error(&#x27;Không nhận được phản hồi từ Gemini AI&#x27;);
            }
        }

        function showError(message) {
            const errorMessage = document.getElementById(&#x27;errorMessage&#x27;);
            errorMessage.textContent = &#x27;❌ &#x27; + message;
            errorMessage.style.display = &#x27;block&#x27;;

            setTimeout(() =&gt; {
                errorMessage.style.display = &#x27;none&#x27;;
            }, 6000);
        }

        function escapeHtml(text) {
            const div = document.createElement(&#x27;div&#x27;);
            div.textContent = text;
            return div.innerHTML;
        }

        function copyScript() {
            const scriptToCopy = scriptData[&#x27;script&#x27; + currentScript];
            if (!scriptToCopy) {
                showError(&#x27;Không có kịch bản để sao chép.&#x27;);
                return;
            }

            navigator.clipboard.writeText(scriptToCopy).then(() =&gt; {
                const copyBtn = document.getElementById(&#x27;copyBtn&#x27;);
                const originalText = copyBtn.textContent;
                copyBtn.textContent = &#x27;✅ Đã copy&#x27;;
                copyBtn.style.background = &#x27;#00cc88&#x27;;

                setTimeout(() =&gt; {
                    copyBtn.textContent = originalText;
                    copyBtn.style.background = &#x27;#00ff99&#x27;;
                }, 2000);
            }).catch(err =&gt; {
                showError(&#x27;Không thể copy: &#x27; + err.message);
            });
        }

        function downloadScript() {
            const scriptText = scriptData[&#x27;script&#x27; + currentScript];
            if (!scriptText) {
                showError(&#x27;Không có kịch bản để tải xuống.&#x27;);
                return;
            }

            const doc = new docx.Document({
                sections: [{
                    properties: {},
                    children: [
                        new docx.Paragraph({
                            children: [
                                new docx.TextRun({
                                    text: &quot;KỊCH BẢN LIVESTREAM 60 PHÚT&quot;,
                                    bold: true,
                                    size: 32,
                                    font: &quot;Arial&quot;
                                })
                            ],
                            spacing: { after: 400 },
                            alignment: docx.AlignmentType.CENTER
                        }),
                        new docx.Paragraph({
                            children: [
                                new docx.TextRun({
                                    text: `Ngày tạo: ${new Date().toLocaleDateString(&#x27;vi-VN&#x27;)}`,
                                    size: 20,
                                    font: &quot;Arial&quot;,
                                    italics: true
                                })
                            ],
                            spacing: { after: 400 },
                            alignment: docx.AlignmentType.CENTER

        // --- Cấu hình API và logic Thử lại (Fix lỗi API) ---
        const GEMINI_MODEL = &quot;gemini-2.5-flash&quot;; // Cập nhật model ổn định hơn
        const API_BASE_URL = &quot;https://generativelanguage.googleapis.com/v1beta/models/&quot;;

        // Hàm fetch có Tự động Thử lại (Exponential Backoff) để tăng độ ổn định
        async function fetchWithRetry(url, options, maxRetries = 3) {
            let lastError = null;
            for (let i = 0; i &lt; maxRetries; i++) {
                // Đợi 1s, 2s, 4s...
                const delay = Math.pow(2, i) * 1000; 
                if (i &gt; 0) {
                    // console.log(`Retrying API call in ${delay / 1000}s... (Attempt ${i + 1}/${maxRetries})`);
                    await new Promise(resolve =&gt; setTimeout(resolve, delay));
                }

                try {
                    const response = await fetch(url, options);
                    if (response.ok) {
                        return response;
                    } else {
                        // Nếu là lỗi 4xx (ví dụ 400 Bad Request, 401 Unauthorized), khả năng là API Key sai
                        if (response.status &gt;= 400 &amp;&amp; response.status &lt; 500) {
                            const errorBody = await response.json();
                            throw new Error(`Client Error (${response.status}): ${errorBody.error.message || &#x27;Lỗi: Vui lòng kiểm tra lại API Key.&#x27;}`);
                        }
                        // Nếu là lỗi 5xx, tiếp tục thử lại
                        lastError = new Error(`HTTP Error! status: ${response.status}`);
                    }
                } catch (error) {
                    // Lỗi mạng hoặc lỗi không xác định
                    lastError = error;
                }
            }
            throw lastError; // Ném lỗi cuối cùng nếu đã thử hết số lần
        }

        // Variables to store data
        let encryptedApiKey = null;

        // API Key Encryption
        function encryptApiKey(apiKey) {
            const secretKey = &#x27;gemini-storytelling-secret&#x27;;
            encryptedApiKey = CryptoJS.AES.encrypt(apiKey, secretKey).toString();
        }

        function decryptApiKey() {
            if (!encryptedApiKey) return &#x27;&#x27;;
            const secretKey = &#x27;gemini-storytelling-secret&#x27;;
            try {
                const bytes = CryptoJS.AES.decrypt(encryptedApiKey, secretKey);
                return bytes.toString(CryptoJS.enc.Utf8);
            } catch (error) {
                console.error(&#x27;Decryption error:&#x27;, error);
                return &#x27;&#x27;;
            }
        }

        // Event listeners
        document.getElementById(&#x27;apiKey&#x27;).addEventListener(&#x27;input&#x27;, function(e) {
            if (e.target.value.trim()) {
                encryptApiKey(e.target.value);
            } else {
                encryptedApiKey = null;
            }
        });

                &#x27;seasonal&#x27;: &#x27;Mùa lễ hội&#x27;,
                &#x27;mixmatch&#x27;: &#x27;Mix &amp; Match&#x27;,

            };

            const audienceNames = {
                &#x27;women&#x27;: &#x27;Phụ nữ&#x27;,
                &#x27;men&#x27;: &#x27;Nam giới&#x27;,
                &#x27;children&#x27;: &#x27;Trẻ em&#x27;,
                &#x27;students&#x27;: &#x27;Học sinh&#x27;,

            try {
                const prompt = `Hãy tạo CHÍNH XÁC 10 chủ đề storytelling hấp dẫn về nội y.

4. FORMAT BẮT BUỘC: Mỗi chủ đề trên một dòng, đánh số từ 1 đến 10 theo format &quot;số. nội dung&quot;

2. Chủ đề thứ hai ở đây
...
10. Chủ đề thứ mười ở đây`;

                const apiUrl = `${API_BASE_URL}${GEMINI_MODEL}:generateContent?key=${apiKey}`;

                const response = await fetchWithRetry(apiUrl, {
                    method: &#x27;POST&#x27;,
                    headers: {

                    },
                    body: JSON.stringify({

                            maxOutputTokens: 2000,

                if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) {

                }

                const topicsText = data.candidates[0].content.parts[0].text;
                console.log(&#x27;Raw topics response:&#x27;, topicsText);

                // Parse topics bằng regex match numbered items (hỗ trợ multi-line topics)
                let topics = [];
                const matches = topicsText.match(/(?:^|\n)\s*\*{0,2}\s*\d+[\.)\-:\s]+[\s\S]*?(?=\n\s*\*{0,2}\s*\d+[\.)\-:\s]|$)/g);
                if (matches) {
                    topics = matches
                        .map(t =&gt; t.replace(/\*\*/g, &#x27;&#x27;)
                                   .replace(/^\s*\d+[\.)\-:\s]+/, &#x27;&#x27;)
                                   .replace(/\n/g, &#x27; &#x27;)
                                   .trim())
                        .filter(t =&gt; t.length &gt; 5)
                        .slice(0, 10);
                }

                // Fallback: nếu regex match không được, thử split theo dòng
                if (topics.length &lt; 3) {
                    console.log(&#x27;Regex match got only&#x27;, topics.length, &#x27;topics, trying line split fallback...&#x27;);
                    topics = topicsText.split(&#x27;\n&#x27;)
                        .map(t =&gt; t.trim())
                        .filter(t =&gt; t.length &gt; 5)
                        .map(t =&gt; t.replace(/\*\*/g, &#x27;&#x27;)
                                   .replace(/^\d+[\.)\-:\s]+/, &#x27;&#x27;)
                                   .replace(/^[\-\*•\#]+\s*/, &#x27;&#x27;)
                                   .trim())
                        .filter(t =&gt; t.length &gt; 5)
                        .slice(0, 10);

                if (topics.length &gt; 0) {
                    topics.forEach((topic, index) =&gt; {

            } catch (error) {

            }
        }

                        &lt;div class=&quot;flex items-center space-x-3&quot;&gt;

                            &lt;button onclick=&quot;exportToDocx()&quot; class=&quot;px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 text-sm transition-colors&quot;&gt;

                    &lt;h2 class=&quot;text-lg font-bold text-gray-900 mb-4 flex items-center&quot;&gt;
                        &lt;i class=&quot;fas fa-lightbulb mr-2 text-yellow-500&quot;&gt;&lt;/i&gt; Tư Duy Marketing 2.0
                    &lt;/h2&gt;
                    &lt;ul class=&quot;text-sm text-gray-700 space-y-2 list-disc pl-5&quot;&gt;
                        &lt;li&gt;&lt;b&gt;Tập trung vào khách hàng:&lt;/b&gt; Thay vì nói sản phẩm có gì, hãy nói nó khiến khách hàng cảm thấy thế nào.&lt;/li&gt;
                        &lt;li&gt;&lt;b&gt;Câu chuyện trải nghiệm:&lt;/b&gt; Tạo ra bối cảnh sử dụng lãng mạn, tinh tế qua từng câu chữ.&lt;/li&gt;
                        &lt;li&gt;&lt;b&gt;Giải quyết cảm xúc:&lt;/b&gt; Nâng niu cơ thể, bộc lộ nét quyến rũ thầm kín, sự tự tin từ bên trong.&lt;/li&gt;
                    &lt;/ul&gt;

    &lt;/main&gt;

    &lt;script&gt;
        let currentDescription = null;
        let uploadedImages = [];

        function showMessage(text, type = &#x27;info&#x27;) {
            const box = document.getElementById(&#x27;msgBox&#x27;);
            const boxText = document.getElementById(&#x27;msgText&#x27;);
            if (!box || !boxText) return;
            boxText.textContent = text;
            box.className = `message-box active border-l-4 ${type === &#x27;error&#x27; ? &#x27;border-red-500 text-red-700 bg-red-50&#x27; : &#x27;border-pink-500 text-gray-800 bg-white&#x27;}`;
            setTimeout(() =&gt; box.classList.remove(&#x27;active&#x27;), 5000);
        }

        async function fetchWithRetry(url, options, maxRetries = 5) {
            let lastError;
            for (let i = 0; i &lt; maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    const errorData = await response.json().catch(() =&gt; ({}));
                    lastError = new Error(errorData?.error?.message || `Lỗi API (${response.status})`);
                    if (response.status === 429) {
                        const waitTime = Math.pow(2, i + 2) * 2000;
                        await new Promise(r =&gt; setTimeout(r, waitTime));
                        continue;
                    }
                    if (response.status &gt;= 500) {
                        await new Promise(r =&gt; setTimeout(r, Math.pow(2, i) * 1000));
                        continue;
                    }
                    throw lastError;
                } catch (e) {
                    lastError = e;
                    if (i === maxRetries - 1) throw e;
                    await new Promise(r =&gt; setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            throw lastError;
        }

        document.addEventListener(&#x27;DOMContentLoaded&#x27;, () =&gt; {
            const savedKey = localStorage.getItem(&#x27;gemini_api_key&#x27;);
            if (savedKey) {
                document.getElementById(&#x27;apiKey&#x27;).value = savedKey;
                showStatus(&#x27;apiKeyStatus&#x27;, &#x27;API Key đã sẵn sàng!&#x27;, &#x27;success&#x27;);
            }
        });

        // UI Helpers
        function dragOverHandler(e) { e.preventDefault(); e.currentTarget.classList.add(&#x27;border-primary&#x27;, &#x27;bg-pink-50&#x27;); }
        function dragLeaveHandler(e) { e.preventDefault(); e.currentTarget.classList.remove(&#x27;border-primary&#x27;, &#x27;bg-pink-50&#x27;); }
        function dropHandler(e) { 
            e.preventDefault(); 
            e.currentTarget.classList.remove(&#x27;border-primary&#x27;, &#x27;bg-pink-50&#x27;); 
            handleFiles(Array.from(e.dataTransfer.files)); 
        }
        function handleFileSelect(e) { handleFiles(Array.from(e.target.files)); }

        function handleFiles(files) {
            const imageFiles = files.filter(file =&gt; file.type.startsWith(&#x27;image/&#x27;));
            imageFiles.forEach(file =&gt; {
                const reader = new FileReader();
                reader.onload = (e) =&gt; {
                    uploadedImages.push({ 
                        file, 
                        dataUrl: e.target.result, 
                        name: file.name,
                        mimeType: file.type || &#x27;image/png&#x27;
                    });
                    displayImages();
                };
                reader.readAsDataURL(file);
            });
        }

        function displayImages() {
            const preview = document.getElementById(&#x27;imagePreview&#x27;);
            const clearBtn = document.getElementById(&#x27;clearImagesBtn&#x27;);
            if (!uploadedImages.length) { 
                preview.classList.add(&#x27;hidden&#x27;); 
                clearBtn.classList.add(&#x27;hidden&#x27;); 
                return; 
            }
            preview.classList.remove(&#x27;hidden&#x27;); 
            clearBtn.classList.remove(&#x27;hidden&#x27;);
            preview.innerHTML = uploadedImages.map((img, i) =&gt; `
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;img src=&quot;${img.dataUrl}&quot; class=&quot;w-full h-32 object-cover rounded-lg border&quot;&gt;
                    &lt;button onclick=&quot;removeImage(${i})&quot; class=&quot;absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition-all&quot;&gt;
                        &lt;i class=&quot;fas fa-times text-xs&quot;&gt;&lt;/i&gt;
                    &lt;/button&gt;
                &lt;/div&gt;
            `).join(&#x27;&#x27;);
        }

        function removeImage(i) { uploadedImages.splice(i, 1); displayImages(); }
        function clearImages() { uploadedImages = []; displayImages(); document.getElementById(&#x27;imageInput&#x27;).value = &#x27;&#x27;; }

        function saveApiKey() {
            const key = document.getElementById(&#x27;apiKey&#x27;).value.trim();
            if (key) {
                localStorage.setItem(&#x27;gemini_api_key&#x27;, key);
                showStatus(&#x27;apiKeyStatus&#x27;, &#x27;API Key đã được lưu thành công!&#x27;, &#x27;success&#x27;);
                showMessage(&#x27;Đã lưu API Key thành công!&#x27;);
            }
        }

        function showStatus(id, msg, type) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = msg;
            el.className = `mt-2 text-sm ${type === &#x27;success&#x27; ? &#x27;text-green-600 font-medium&#x27; : &#x27;text-red-600&#x27;}`;
        }

        function getShortDescriptionArray(data) {
            if (!data || !data.short_description) return [];
            if (Array.isArray(data.short_description)) return data.short_description;
            if (typeof data.short_description === &#x27;string&#x27;) {
                return data.short_description.split(&#x27;\n&#x27;).filter(l =&gt; l.trim() !== &#x27;&#x27;);
            }
            return [];
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement(&#x27;a&#x27;);
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() =&gt; {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 0);
        }

        async function generateDescription() {
            const apiKey = localStorage.getItem(&#x27;gemini_api_key&#x27;) || &quot;&quot;;
            if (!apiKey) return showMessage(&#x27;Vui lòng nhập và lưu API Key trước!&#x27;, &#x27;error&#x27;);
            
            const form = document.getElementById(&#x27;productForm&#x27;);
            const data = Object.fromEntries(new FormData(form));
            if (!data.name) return showMessage(&#x27;Vui lòng nhập tên sản phẩm!&#x27;, &#x27;error&#x27;);

            const loadingState = document.getElementById(&#x27;loadingState&#x27;);
            const resultPanel = document.getElementById(&#x27;resultPanel&#x27;);
            const generateBtn = document.getElementById(&#x27;generateBtn&#x27;);

            loadingState.classList.remove(&#x27;hidden&#x27;);
            resultPanel.classList.add(&#x27;hidden&#x27;);
            generateBtn.disabled = true;

            try {
                const imageParts = [];
                if (document.getElementById(&#x27;useImageAnalysis&#x27;).checked &amp;&amp; uploadedImages.length &gt; 0) {
                    for (const img of uploadedImages) {
                        const base64 = img.dataUrl.split(&#x27;,&#x27;)[1];
                        imageParts.push({ inlineData: { mimeType: img.mimeType, data: base64 } });
                    }
                }

                const systemPrompt = `Bạn là một chuyên gia Content Marketing 2.0 và SEO hàng đầu trong lĩnh vực Nội y và Đồ mặc nhà cao cấp. Triết lý của bạn là: Không bán sản phẩm, hãy bán cảm xúc và trải nghiệm sống. Mục tiêu: Viết mô tả sản phẩm tinh tế, thấu hiểu tâm lý khách hàng, khơi gợi nét quyến rũ tự nhiên và sự tự tin từ bên trong. LƯU Ý QUAN TRỌNG VỀ SEO: Hãy lồng ghép một cách tự nhiên các từ khóa SEO ngành hàng vào nội dung. LƯU Ý PHẦN MÔ TẢ NGẮN (short_description): BẮT BUỘC phải chứa các từ khóa SEO sản phẩm.`;

                const userPrompt = `Hãy viết mô tả sản phẩm Marketing 2.0 và chuẩn SEO cho:
                - Tên sản phẩm: ${data.name}
                - Loại: ${data.type}
                - Chất liệu: ${data.material}
                - Thành phần: ${data.composition}
                - Kiểu dáng &amp; Thiết kế: ${data.style_design}
                - Chi tiết phụ: Phom áo ${data.top_fit}, phom quần ${data.bottom_fit}, mút ${data.padding}, dây ${data.strap}, mắc cài ${data.clasp}
                - Màu sắc: ${data.color}
                - Đối tượng: ${data.gender}
                - Đặc tính khác: ${data.other_content}
                - Mix &amp; Match: ${data.mix_match}
                - Phong cách viết: ${data.description_style}

                YÊU CẦU ĐỊNH DẠNG JSON:
                {
                    &quot;title&quot;: &quot;${data.name}&quot;,
                    &quot;marketing_title&quot;: &quot;Tiêu đề phụ gợi cảm hứng, chứa từ khóa SEO&quot;,
                    &quot;short_description&quot;: &quot;3-5 dòng chứa các lợi ích cảm xúc và BẮT BUỘC có từ khóa SEO sản phẩm&quot;,
                    &quot;detailed_description&quot;: &quot;2-3 đoạn kể câu chuyện trải nghiệm khách hàng&quot;,
                    &quot;specifications&quot;: {
                        &quot;Thành phần&quot;: &quot;${data.composition}&quot;,
                        &quot;Kích thước&quot;: &quot;${data.size}&quot;,
                        &quot;Màu sắc&quot;: &quot;${data.color}&quot;,
                        &quot;Chất liệu&quot;: &quot;${data.material}&quot;
                    }
                }`;

                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: &#x27;POST&#x27;,
                    headers: { &#x27;Content-Type&#x27;: &#x27;application/json&#x27; },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userPrompt }, ...imageParts] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: &quot;application/json&quot;, temperature: 0.8 }
                    })
                });

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error(&quot;AI không trả về nội dung hợp lệ.&quot;);
                
                currentDescription = JSON.parse(text);
                displayDescription(currentDescription);
            } catch (error) {
                console.error(error);
                showMessage(&#x27;Lỗi: &#x27; + error.message, &#x27;error&#x27;);
            } finally {
                loadingState.classList.add(&#x27;hidden&#x27;);
                generateBtn.disabled = false;
            }
        }

        function displayDescription(data) {
            const content = document.getElementById(&#x27;descriptionContent&#x27;);
            if (!content) return;
            const shortLines = getShortDescriptionArray(data);
            let shortDescHtml = &#x27;&#x27;;
            shortLines.forEach(line =&gt; {
                shortDescHtml += `&lt;li class=&quot;flex items-start&quot;&gt;&lt;span class=&quot;mr-2 text-primary&quot;&gt;•&lt;/span&gt;&lt;span&gt;${line.replace(/^[•\-\*]\s*/, &#x27;&#x27;)}&lt;/span&gt;&lt;/li&gt;`;
            });

            content.innerHTML = `
                &lt;div class=&quot;mb-6&quot;&gt;
                    &lt;h2 class=&quot;text-3xl font-bold text-gray-900 mb-2&quot;&gt;${data.title}&lt;/h2&gt;
                    &lt;p class=&quot;text-xl font-medium text-primary italic&quot;&gt;${data.marketing_title || &#x27;&#x27;}&lt;/p&gt;
                &lt;/div&gt;
                &lt;div class=&quot;bg-pink-50 p-5 rounded-xl border border-pink-100 shadow-sm mb-6&quot;&gt;
                    &lt;h4 class=&quot;text-xs font-bold text-primary uppercase tracking-widest mb-3&quot;&gt;Mô tả ngắn&lt;/h4&gt;
                    &lt;ul class=&quot;space-y-2 text-gray-700&quot;&gt;${shortDescHtml}&lt;/ul&gt;
                &lt;/div&gt;
                &lt;div class=&quot;prose max-w-none text-gray-700 leading-relaxed text-justify space-y-4 mb-8&quot;&gt;
                    ${data.detailed_description ? data.detailed_description.split(&#x27;\n\n&#x27;).map(p =&gt; `&lt;p&gt;${p}&lt;/p&gt;`).join(&#x27;&#x27;) : &#x27;&#x27;}
                &lt;/div&gt;
                &lt;div class=&quot;border-t border-gray-100 pt-6&quot;&gt;
                    &lt;h4 class=&quot;font-bold text-gray-900 mb-4 flex items-center uppercase tracking-wider&quot;&gt;
                        &lt;i class=&quot;fas fa-list-ul mr-2 text-gray-400&quot;&gt;&lt;/i&gt; Thông Số Kỹ Thuật
                    &lt;/h4&gt;
                    &lt;div class=&quot;grid grid-cols-2 gap-3 text-sm&quot;&gt;
                        ${data.specifications ? Object.entries(data.specifications).map(([k, v]) =&gt; `
                            &lt;div class=&quot;bg-gray-50 p-3 rounded-lg border border-gray-100&quot;&gt;
                                &lt;span class=&quot;text-gray-400 block uppercase text-[10px] font-bold mb-1&quot;&gt;${k}&lt;/span&gt;
                                &lt;span class=&quot;text-gray-800 font-semibold&quot;&gt;${v || &#x27;Đang cập nhật&#x27;}&lt;/span&gt;
                            &lt;/div&gt;
                        `).join(&#x27;&#x27;) : &#x27;&#x27;}
                    &lt;/div&gt;
                &lt;/div&gt;
            `;
            const resPanel = document.getElementById(&#x27;resultPanel&#x27;);
            if (resPanel) {
                resPanel.classList.remove(&#x27;hidden&#x27;);
                resPanel.scrollIntoView({ behavior: &#x27;smooth&#x27; });
            }
        }

        function copyDescription() {
            if (!currentDescription) return;
            const shortDesc = Array.isArray(currentDescription.short_description) 
                ? currentDescription.short_description.join(&#x27;\n&#x27;) 
                : currentDescription.short_description;
            const specs = Object.entries(currentDescription.specifications || {})
                .map(([k, v]) =&gt; `${k}: ${v}`).join(&#x27;\n&#x27;);
            const text = `${currentDescription.title}\n${currentDescription.marketing_title || &#x27;&#x27;}\n\nMÔ TẢ NGẮN:\n${shortDesc}\n\nMÔ TẢ CHI TIẾT:\n${currentDescription.detailed_description}\n\nTHÔNG SỐ KỸ THUẬT:\n${specs}`;
            const textArea = document.createElement(&quot;textarea&quot;);
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand(&#x27;copy&#x27;);
            document.body.removeChild(textArea);
            showMessage(&#x27;Đã copy nội dung!&#x27;);
        }

        async function exportToDocx() {
            if (!currentDescription) return;
            // Sanitize filename
            const safeName = currentDescription.title.replace(/[/\\?%*:|&quot;&lt;&gt;]/g, &#x27;-&#x27;);
            const timestamp = new Date().getTime();

            try {
                if (typeof docx === &#x27;undefined&#x27;) throw new Error(&quot;Thư viện docx chưa được tải.&quot;);

                const shortLines = getShortDescriptionArray(currentDescription);
                const ArialFont = &quot;Arial&quot;;

                const doc = new docx.Document({
                    sections: [{
                        properties: {},
                        children: [
                            new docx.Paragraph({
                                children: [new docx.TextRun({ text: currentDescription.title, bold: true, size: 32, font: ArialFont })],
                                heading: docx.HeadingLevel.HEADING_1,
                                spacing: { after: 200 }
                            }),

    &lt;script&gt;
        let backgroundImage = null;
        let products = [];
        let selectedThumbnails = new Set();
        let currentEditingProduct = null;

        // Advanced background removal with smooth edge detection
        function advancedBackgroundRemoval(imageData, canvas, sensitivity = 40, preserveWhite = true, edgeBlur = 2) {
            const ctx = canvas.getContext(&#x27;2d&#x27;);
            const data = imageData.data;
            const width = canvas.width;
            const height = canvas.height;

            // Sample multiple edge points for better background detection
            const samplePoints = [];
            const edge = 5; // Avoid exact corners

            // Top edge
            for (let x = edge; x &lt; width - edge; x += Math.floor(width / 20)) {
                samplePoints.push([x, edge]);
            }
            // Bottom edge
            for (let x = edge; x &lt; width - edge; x += Math.floor(width / 20)) {
                samplePoints.push([x, height - edge]);
            }
            // Left edge
            for (let y = edge; y &lt; height - edge; y += Math.floor(height / 20)) {
                samplePoints.push([edge, y]);
            }
            // Right edge
            for (let y = edge; y &lt; height - edge; y += Math.floor(height / 20)) {
                samplePoints.push([width - edge, y]);
            }

            // Collect background colors
            let bgColors = [];
            samplePoints.forEach(([x, y]) =&gt; {
                const idx = (y * width + x) * 4;
                bgColors.push({
                    r: data[idx],
                    g: data[idx + 1],
                    b: data[idx + 2],
                    brightness: (data[idx] + data[idx + 1] + data[idx + 2]) / 3
                });
            });

            // Find dominant background color
            let dominantBg = bgColors.reduce((prev, curr) =&gt; {
                let prevCount = bgColors.filter(c =&gt; 
                    Math.abs(c.r - prev.r) &lt; 30 &amp;&amp; 
                    Math.abs(c.g - prev.g) &lt; 30 &amp;&amp; 
                    Math.abs(c.b - prev.b) &lt; 30
                ).length;
                let currCount = bgColors.filter(c =&gt; 
                    Math.abs(c.r - curr.r) &lt; 30 &amp;&amp; 
                    Math.abs(c.g - curr.g) &lt; 30 &amp;&amp; 
                    Math.abs(c.b - curr.b) &lt; 30
                ).length;
                return currCount &gt; prevCount ? curr : prev;
            });

            // Create alpha map for smooth transitions
            let alphaMap = new Array(width * height).fill(255);

            // First pass: Detect background pixels
            for (let y = 0; y &lt; height; y++) {
                for (let x = 0; x &lt; width; x++) {
                    const idx = (y * width + x) * 4;
                    const r = data[idx];
                    const g = data[idx + 1];
                    const b = data[idx + 2];

                    // Calculate similarity to dominant background
                    const colorDiff = Math.abs(r - dominantBg.r) + 
                                    Math.abs(g - dominantBg.g) + 
                                    Math.abs(b - dominantBg.b);

                    const brightness = (r + g + b) / 3;

                    // Decide whether to make transparent
                    let makeTransparent = false;
                    let alpha = 255;

                    // If very similar to background color
                    if (colorDiff &lt; sensitivity) {
                        makeTransparent = true;
                        alpha = Math.max(0, 255 - ((sensitivity - colorDiff) / sensitivity) * 255);
                    }

                    // Special handling for white/light colors
                    if (brightness &gt; 240 &amp;&amp; !preserveWhite) {
                        makeTransparent = true;
                        alpha = Math.max(0, 255 - ((brightness - 240) / 15) * 255);
                    } else if (brightness &gt; 250 &amp;&amp; preserveWhite) {
                        if (colorDiff &lt; sensitivity * 0.7) {
                            makeTransparent = true;
                            alpha = Math.max(0, 255 - ((sensitivity * 0.7 - colorDiff) / (sensitivity * 0.7)) * 255);
                        }
                    }

                    if (makeTransparent) {
                        alphaMap[y * width + x] = alpha;
                    }
                }
            }

            // Second pass: Apply smooth edge blur
            if (edgeBlur &gt; 0) {
                let smoothedAlphaMap = [...alphaMap];

                for (let y = edgeBlur; y &lt; height - edgeBlur; y++) {
                    for (let x = edgeBlur; x &lt; width - edgeBlur; x++) {
                        const centerIdx = y * width + x;
                        const centerAlpha = alphaMap[centerIdx];

                        // Skip if already fully opaque
                        if (centerAlpha === 255) continue;

                        // Check if this pixel is near an edge (transition zone)
                        let isNearEdge = false;
                        let minAlpha = centerAlpha;
                        let maxAlpha = centerAlpha;

                        // Check surrounding pixels within blur radius
                        for (let dy = -edgeBlur; dy &lt;= edgeBlur &amp;&amp; !isNearEdge; dy++) {
                            for (let dx = -edgeBlur; dx &lt;= edgeBlur &amp;&amp; !isNearEdge; dx++) {
                                if (dx === 0 &amp;&amp; dy === 0) continue;

                                const neighborIdx = (y + dy) * width + (x + dx);
                                const neighborAlpha = alphaMap[neighborIdx];

                                minAlpha = Math.min(minAlpha, neighborAlpha);
                                maxAlpha = Math.max(maxAlpha, neighborAlpha);

                                // If there&#x27;s a significant alpha difference nearby, this is an edge
                                if (Math.abs(centerAlpha - neighborAlpha) &gt; 100) {
                                    isNearEdge = true;
                                }
                            }
                        }

                        // Apply gaussian-like blur for smooth edges
                        if (isNearEdge &amp;&amp; centerAlpha &lt; 255) {
                            let totalAlpha = 0;
                            let totalWeight = 0;

                            for (let dy = -edgeBlur; dy &lt;= edgeBlur; dy++) {
                                for (let dx = -edgeBlur; dx &lt;= edgeBlur; dx++) {
                                    const distance = Math.sqrt(dx * dx + dy * dy);
                                    if (distance &lt;= edgeBlur) {
                                        // Gaussian weight
                                        const weight = Math.exp(-(distance * distance) / (2 * (edgeBlur / 3) * (edgeBlur / 3)));
                                        const neighborIdx = (y + dy) * width + (x + dx);

                                        if (neighborIdx &gt;= 0 &amp;&amp; neighborIdx &lt; alphaMap.length) {
                                            totalAlpha += alphaMap[neighborIdx] * weight;
                                            totalWeight += weight;
                                        }
                                    }
                                }
                            }

                            if (totalWeight &gt; 0) {
                                smoothedAlphaMap[centerIdx] = Math.round(totalAlpha / totalWeight);
                            }
                        }
                    }
                }

                alphaMap = smoothedAlphaMap;
            }

            // Apply the final alpha values
            for (let y = 0; y &lt; height; y++) {
                for (let x = 0; x &lt; width; x++) {
                    const idx = (y * width + x) * 4;
                    const mapIdx = y * width + x;
                    data[idx + 3] = alphaMap[mapIdx];
                }
            }

            ctx.putImageData(imageData, 0, 0);
            return canvas;
        }

        // Handle background upload
        document.getElementById(&#x27;backgroundInput&#x27;).addEventListener(&#x27;change&#x27;, function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        backgroundImage = img;
                        showStatus(&#x27;backgroundStatus&#x27;, &#x27;Phông nền đã tải lên thành công!&#x27;, &#x27;success&#x27;);
                        updateDownloadButtons();
                        updateWorkspaceInfo();
                        generateThumbnails();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle product upload with improved processing
        document.getElementById(&#x27;productInput&#x27;).addEventListener(&#x27;change&#x27;, function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            showStatus(&#x27;productStatus&#x27;, `Đang xử lý ${files.length} sản phẩm với thuật toán xóa nền thông minh...`, &#x27;success&#x27;);

            let processed = 0;
            files.forEach((file, index) =&gt; {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        // Create canvas for advanced background removal
                        const canvas = document.createElement(&#x27;canvas&#x27;);
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext(&#x27;2d&#x27;);

                        ctx.drawImage(img, 0, 0);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                        // Apply advanced background removal
                        const sensitivity = parseInt(document.getElementById(&#x27;sensitivity&#x27;).value);
                        const preserveWhite = document.getElementById(&#x27;preserveWhite&#x27;).checked;
                        const edgeBlur = parseInt(document.getElementById(&#x27;edgeBlur&#x27;).value);

                        advancedBackgroundRemoval(imageData, canvas, sensitivity, preserveWhite, edgeBlur);

                        // Create product object
                        const product = {
                            id: Date.now() + index,
                            name: file.name.replace(/\.[^/.]+$/, &quot;&quot;),
                            originalImage: img,
                            image: img,
                            canvas: canvas,
                            scale: 0.6,
                            x: 0,
                            y: 0,
                            rotation: 0
                        };

                        products.push(product);
                        processed++;

                        if (processed === files.length) {
                            showStatus(&#x27;productStatus&#x27;, `Đã xử lý ${files.length} sản phẩm với công nghệ xóa nền thông minh!`, &#x27;success&#x27;);
                            generateThumbnails();
                            updateDownloadButtons();
                            updateWorkspaceInfo();
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        });

        // Reprocess backgrounds with new settings
        function reprocessBackgrounds() {
            if (products.length === 0) return;

            showStatus(&#x27;productStatus&#x27;, &#x27;Đang xử lý lại nền với cài đặt mới...&#x27;, &#x27;success&#x27;);

            const sensitivity = parseInt(document.getElementById(&#x27;sensitivity&#x27;).value);
            const preserveWhite = document.getElementById(&#x27;preserveWhite&#x27;).checked;
            const edgeBlur = parseInt(document.getElementById(&#x27;edgeBlur&#x27;).value);

            products.forEach(product =&gt; {
                const canvas = document.createElement(&#x27;canvas&#x27;);
                canvas.width = product.originalImage.width;
                canvas.height = product.originalImage.height;
                const ctx = canvas.getContext(&#x27;2d&#x27;);

                ctx.drawImage(product.originalImage, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                advancedBackgroundRemoval(imageData, canvas, sensitivity, preserveWhite, edgeBlur);
                product.canvas = canvas;
            });

            generateThumbnails();
            showStatus(&#x27;productStatus&#x27;, &#x27;Đã xử lý lại nền thành công!&#x27;, &#x27;success&#x27;);
        }

        // Generate thumbnails with rotation support
        function generateThumbnails() {
            const grid = document.getElementById(&#x27;thumbnailsGrid&#x27;);
            grid.innerHTML = &#x27;&#x27;;

            products.forEach(product =&gt; {
                const thumbnailDiv = document.createElement(&#x27;div&#x27;);
                thumbnailDiv.className = &#x27;thumbnail-item&#x27;;
                thumbnailDiv.setAttribute(&#x27;data-id&#x27;, product.id);

                // Update selection state
                if (selectedThumbnails.has(product.id)) {
                    thumbnailDiv.classList.add(&#x27;selected&#x27;);
                }

                const canvas = document.createElement(&#x27;canvas&#x27;);
                canvas.width = 200;
                canvas.height = 200;
                canvas.className = &#x27;thumbnail-canvas&#x27;;

                const ctx = canvas.getContext(&#x27;2d&#x27;);

                // Clear canvas with white background
                ctx.fillStyle = &#x27;white&#x27;;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw background if available (fit to square)
                if (backgroundImage) {
                    // Calculate scale to fit square while maintaining aspect ratio
                    const bgScale = Math.min(canvas.width / backgroundImage.width, canvas.height / backgroundImage.height);
                    const bgWidth = backgroundImage.width * bgScale;
                    const bgHeight = backgroundImage.height * bgScale;
                    const bgX = (canvas.width - bgWidth) / 2;
                    const bgY = (canvas.height - bgHeight) / 2;

                    ctx.drawImage(backgroundImage, bgX, bgY, bgWidth, bgHeight);
                }

                // Draw product with rotation
                const productCanvas = product.canvas;
                const scale = product.scale;

                // For Preview (always square 200x200), the ratio is uniform
                const ratio = canvas.width / 1200; 

                const x = product.x * ratio + canvas.width / 2;
                const y = product.y * ratio + canvas.height / 2;
                const rotation = (product.rotation || 0) * Math.PI / 180;

                const scaledWidth = productCanvas.width * scale * ratio;
                const scaledHeight = productCanvas.height * scale * ratio;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                ctx.drawImage(
                    productCanvas,
                    -scaledWidth / 2,
                    -scaledHeight / 2,
                    scaledWidth,
                    scaledHeight
                );
                ctx.restore();

                // Create thumbnail info
                const info = document.createElement(&#x27;div&#x27;);
                info.className = &#x27;thumbnail-info&#x27;;
                info.innerHTML = `
                    &lt;span class=&quot;thumbnail-name&quot;&gt;${product.name}&lt;/span&gt;
                    &lt;button class=&quot;delete-btn&quot; onclick=&quot;deleteProduct(${product.id})&quot;&gt;Xóa&lt;/button&gt;
                `;

                thumbnailDiv.appendChild(canvas);
                thumbnailDiv.appendChild(info);

                // Add click event for selection/editing
                thumbnailDiv.addEventListener(&#x27;click&#x27;, function(e) {
                    if (e.target.classList.contains(&#x27;delete-btn&#x27;)) return;

                    // If holding Ctrl/Cmd, toggle selection for batch editing
                    if (e.ctrlKey || e.metaKey) {
                        toggleThumbnailSelection(product.id);
                    } else {
                        // Single click - select for individual editing
                        setCurrentEditingProduct(product.id);
                    }
                });

                grid.appendChild(thumbnailDiv);
            });
        }

        // Set current editing product
        function setCurrentEditingProduct(productId) {
            currentEditingProduct = productId;
            const product = products.find(p =&gt; p.id === productId);

            if (product) {
                // Update control values to match current product
                document.getElementById(&#x27;globalScale&#x27;).value = product.scale;
                document.getElementById(&#x27;globalX&#x27;).value = product.x;
                document.getElementById(&#x27;globalY&#x27;).value = product.y;
                document.getElementById(&#x27;rotation&#x27;).value = product.rotation || 0;
                document.getElementById(&#x27;globalScaleValue&#x27;).textContent = product.scale + &#x27;x&#x27;;
                document.getElementById(&#x27;rotationValue&#x27;).textContent = (product.rotation || 0) + &#x27;°&#x27;;

                // Update current editing display
                document.getElementById(&#x27;currentEditing&#x27;).style.display = &#x27;block&#x27;;
                document.getElementById(&#x27;currentProductName&#x27;).textContent = product.name;

                // Clear batch selection when editing individual product
                selectedThumbnails.clear();
                updateSelectedInfo();
                updateDownloadButtons();

                // Remove all selection highlights and add editing highlight
                document.querySelectorAll(&#x27;.thumbnail-item&#x27;).forEach(item =&gt; {
                    item.classList.remove(&#x27;selected&#x27;);
                    if (item.getAttribute(&#x27;data-id&#x27;) == productId) {
                        item.style.border = &#x27;3px solid #ffc107&#x27;;
                    } else {
                        item.style.border = &#x27;3px solid transparent&#x27;;
                    }
                });
            }
        }

        // Toggle thumbnail selection for batch editing
        function toggleThumbnailSelection(productId) {
            // Clear individual editing mode
            currentEditingProduct = null;
            document.getElementById(&#x27;currentEditing&#x27;).style.display = &#x27;none&#x27;;
            document.querySelectorAll(&#x27;.thumbnail-item&#x27;).forEach(item =&gt; {
                item.style.border = &#x27;3px solid transparent&#x27;;
            });

            const thumbnailDiv = document.querySelector(`[data-id=&quot;${productId}&quot;]`);

            if (selectedThumbnails.has(productId)) {
                selectedThumbnails.delete(productId);
                thumbnailDiv.classList.remove(&#x27;selected&#x27;);
            } else {
                selectedThumbnails.add(productId);
                thumbnailDiv.classList.add(&#x27;selected&#x27;);
            }

            updateSelectedInfo();
            updateDownloadButtons();
        }

        // Select all thumbnails
        function selectAllThumbnails() {
            currentEditingProduct = null;
            document.getElementById(&#x27;currentEditing&#x27;).style.display = &#x27;none&#x27;;
            document.querySelectorAll(&#x27;.thumbnail-item&#x27;).forEach(item =&gt; {
                item.style.border = &#x27;3px solid transparent&#x27;;
            });

            products.forEach(product =&gt; {
                selectedThumbnails.add(product.id);
                const thumbnailDiv = document.querySelector(`[data-id=&quot;${product.id}&quot;]`);
                thumbnailDiv.classList.add(&#x27;selected&#x27;);
            });
            updateSelectedInfo();
            updateDownloadButtons();
        }

        // Deselect all thumbnails
        function deselectAllThumbnails() {
            currentEditingProduct = null;
            document.getElementById(&#x27;currentEditing&#x27;).style.display = &#x27;none&#x27;;

            selectedThumbnails.clear();
            document.querySelectorAll(&#x27;.thumbnail-item&#x27;).forEach(item =&gt; {
                item.classList.remove(&#x27;selected&#x27;);
                item.style.border = &#x27;3px solid transparent&#x27;;
            });
            updateSelectedInfo();
            updateDownloadButtons();
        }

        // Update selected info
        function updateSelectedInfo() {
            const selectedInfo = document.getElementById(&#x27;selectedInfo&#x27;);
            const selectedCount = document.getElementById(&#x27;selectedCount&#x27;);

            if (selectedThumbnails.size &gt; 0) {
                selectedInfo.style.display = &#x27;block&#x27;;
                selectedCount.textContent = selectedThumbnails.size;
            } else {
                selectedInfo.style.display = &#x27;none&#x27;;
            }
        }

        // Delete product
        function deleteProduct(productId) {
            products = products.filter(p =&gt; p.id !== productId);
            selectedThumbnails.delete(productId);
            if (currentEditingProduct === productId) {
                currentEditingProduct = null;
                document.getElementById(&#x27;currentEditing&#x27;).style.display = &#x27;none&#x27;;
            }
            generateThumbnails();
            updateSelectedInfo();
            updateDownloadButtons();
            updateWorkspaceInfo();
        }

        // Apply changes with rotation support
        function applyChanges() {
            const scale = parseFloat(document.getElementById(&#x27;globalScale&#x27;).value);
            const x = parseInt(document.getElementById(&#x27;globalX&#x27;).value) || 0;
            const y = parseInt(document.getElementById(&#x27;globalY&#x27;).value) || 0;
            const rotation = parseInt(document.getElementById(&#x27;rotation&#x27;).value) || 0;

            let targetProducts = [];

            // If editing individual product
            if (currentEditingProduct) {
                targetProducts = products.filter(p =&gt; p.id === currentEditingProduct);
            }
            // If batch editing selected products
            else if (selectedThumbnails.size &gt; 0) {
                targetProducts = products.filter(p =&gt; selectedThumbnails.has(p.id));
            }
            // If nothing selected, apply to all
            else {
                targetProducts = products;
            }

            targetProducts.forEach(product =&gt; {
                product.scale = scale;
                product.x = x;
                product.y = y;
                product.rotation = rotation;
            });

            generateThumbnails();
        }

        // Center products
        function centerProducts() {
            let targetProducts = [];

            // If editing individual product
            if (currentEditingProduct) {
                targetProducts = products.filter(p =&gt; p.id === currentEditingProduct);
            }
            // If batch editing selected products
            else if (selectedThumbnails.size &gt; 0) {
                targetProducts = products.filter(p =&gt; selectedThumbnails.has(p.id));
            }
            // If nothing selected, apply to all
            else {
                targetProducts = products;
            }

            targetProducts.forEach(product =&gt; {
                product.x = 0;
                product.y = 0;
            });

            document.getElementById(&#x27;globalX&#x27;).value = 0;
            document.getElementById(&#x27;globalY&#x27;).value = 0;

            generateThumbnails();
        }

        // Reset positions
        function resetPositions() {
            let targetProducts = [];

            // If editing individual product
            if (currentEditingProduct) {
                targetProducts = products.filter(p =&gt; p.id === currentEditingProduct);
            }
            // If batch editing selected products
            else if (selectedThumbnails.size &gt; 0) {
                targetProducts = products.filter(p =&gt; selectedThumbnails.has(p.id));
            }
            // If nothing selected, apply to all
            else {
                targetProducts = products;

            document.getElementById(&#x27;globalScaleValue&#x27;).textContent = &#x27;0.6x&#x27;;

                    const rotation = (product.rotation || 0) * Math.PI / 180;

                    // Size uses uniform ratio

                    const scaledHeight = productCanvas.height * scale * ratio;

                    ctx.save();

                    ctx.drawImage(

                        -scaledHeight / 2,

                        a.href = url;
                        a.download = `${product.name}_thumbnail.png`;

                        if (processed === targetProducts.length) {
                            setTimeout(() =&gt; {
                                progressBar.style.display = &#x27;none&#x27;;
