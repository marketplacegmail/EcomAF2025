        /* ══════════════════════════════════════════
           THE CARD — 3-SECTION PORTRAIT
           Sec1: image (3:4) + icons — NO overlap
           Sec2: material bar
           Sec3: info + bullets + story
        ══════════════════════════════════════════ */
        #mc-card {
            font-family: &#x27;Barlow&#x27;, sans-serif;
            width: 270px;
            border-radius: 16px;
            background: var(--mc-bg);
            overflow: hidden;
            box-shadow: 0 16px 60px rgba(0,0,0,.22);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            transition: background .3s;
            position: relative;
        }

        /* ── SECTION 1: Image + Icons ── */
        .mcc-sec1 {
            display: flex;
            flex-direction: row;
            align-items: flex-end;   /* both columns bottom-aligned */
            overflow: hidden;
        }

        /* 3D Product image — fixed 3:4 ratio, left side */
        .mcc-img-wrap {
            flex: 0 0 auto;
            width: 206px;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            background: rgba(255,255,255,.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mcc-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
        }

        .mcc-img-ph {
            display: flex; flex-direction: column;
            align-items: center; gap: 6px;
            opacity: .3; padding: 20px; text-align: center;
        }
        .mcc-img-ph svg  { width: 36px; height: 36px; }
        .mcc-img-ph span { font-size: 9px; font-weight: 600; color: var(--mc-text); }

        /* Icons column — right side, fills remaining width */
        .mcc-icon-col {
            flex: 1;
            padding: 10px 6px 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 8px;
            background: rgba(255,255,255,.12);
            margin-bottom: 16px;
        }

        .mcc-icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .mcc-icon-box {
            width: 38px; height: 38px;
            background: rgba(255,255,255,.85);
            border: 1.5px solid var(--mc-accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            transition: border-color .3s;
        }
        .mcc-icon-box img { width: 22px; height: 22px; object-fit: contain; }
        .mcc-icon-box svg { width: 22px; height: 22px; }

        .mcc-icon-lbl {
            font-size: 7px; font-weight: 600;
            color: var(--mc-text); text-align: center; line-height: 1.3;
            width: 100%; white-space: normal; overflow: hidden;
            word-break: break-word;
            transition: color .3s;
        }

        /* ── SECTION 2: Material bar ── */
        .mcc-sec2 {
            padding: 10px 12px 0;
        }

        .mcc-header {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--mc-title);
            letter-spacing: .3px;
            line-height: 1.2;
            padding: 52px 12px 10px;
            transition: color .3s;
        }

        .mcc-mat-lbl  { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mc-text); opacity: .5; margin-bottom: 4px; }
        .mcc-mat-bar  { width: 100%; height: 28px; border-radius: 14px; overflow: hidden; display: flex; }
        .mcc-mat-a    { background: var(--mc-accent); display: flex; align-items: center; padding-left: 12px; min-width: 20px; transition: width .4s; }
        .mcc-mat-b    { flex: 1; background: #e8e9ea; display: flex; align-items: center; justify-content: center; min-width: 16px; }
        .mcc-mat-txt-main { font-size: 10px; font-weight: 700; color: #fff;  white-space: nowrap; }
        .mcc-mat-txt-sub  { font-size: 9px;  font-weight: 600; color: #444; white-space: nowrap; }

        /* ── SECTION 3: Info + Bullets + Story ── */
        .mcc-sec3 {
            padding: 10px 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mcc-info-row { display: grid; grid-template-columns: 1fr 1fr; }
        .mcc-info-val { font-size: 12px; font-weight: 700; color: var(--mc-text); display: block; transition: color .3s; }
        .mcc-info-sub { font-size: 8px;  font-weight: 400; color: #888; display: block; margin-bottom: 2px; }

        .mcc-bullets  { display: flex; flex-direction: column; gap: 7px; border-top: 1px solid rgba(0,0,0,.07); padding-top: 9px; }
        .mcc-bullet-row { display: flex; align-items: flex-start; gap: 7px; }
        .mcc-dot        { width: 8px; height: 8px; border-radius: 50%; background: var(--mc-accent); flex-shrink: 0; margin-top: 3px; transition: background .3s; }
        .mcc-bullet-txt { font-size: 10.5px; font-weight: 400; color: var(--mc-text); line-height: 1.45; transition: color .3s; }

        .mcc-desc-wrap  { background: rgba(0,0,0,.04); border-left: 3px solid var(--mc-accent); border-radius: 0 8px 8px 0; padding: 9px 11px; transition: border-color .3s; }
        .mcc-desc       { font-size: 10.5px; font-style: italic; font-weight: 400; color: var(--mc-text); line-height: 1.55; opacity: .8; transition: color .3s; }

    &lt;/style&gt;
&lt;/head&gt;

const iconImageCache = {};

async function preloadIcons() {
    const promises = Object.entries(iconImageUrls).map(([key,url]) =&gt; new Promise(resolve=&gt;{
        const img = new Image(); img.crossOrigin=&#x27;anonymous&#x27;;
        img.onload=()=&gt;{iconImageCache[key]=img;resolve();};
        img.onerror=()=&gt;resolve();
        img.src=url;
    }));
    await Promise.all(promises);
}

function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0;return `rgba(${r},${g},${b},${a})`;}

function drawIconImage(ctx,iconKey,x,y,size=80){
    const img=iconImageCache[iconKey];
    if(img&amp;&amp;img.complete){
        ctx.shadowColor=&#x27;rgba(214,51,132,0.3)&#x27;; ctx.shadowBlur=15; ctx.shadowOffsetX=0; ctx.shadowOffsetY=2;
        ctx.drawImage(img,x-size/2,y-size/2,size,size);
        ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
    } else {
        ctx.fillStyle=document.getElementById(&#x27;cMain&#x27;).value;
        ctx.beginPath(); ctx.arc(x,y,20,0,Math.PI*2); ctx.fill();
    }
}

async function renderMktCanvas(canvas, imgObj, ai, customIcons) {
    const W=1200, H=1600;
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext(&#x27;2d&#x27;);
    const cM=document.getElementById(&#x27;cMain&#x27;).value, cT=document.getElementById(&#x27;cText&#x27;).value;

    // Background
    if(currentBgStyle===&#x27;gradient&#x27;){
        const g=ctx.createLinearGradient(0,0,0,H);
        g.addColorStop(0,&#x27;#ffffff&#x27;); g.addColorStop(1,&#x27;#fef3f8&#x27;);
        ctx.fillStyle=g;
    } else { ctx.fillStyle=&#x27;#fff&#x27;; }
    ctx.fillRect(0,0,W,H);

    // Layout zones
    const MARGIN = 240;          // left/right margin width for callouts
    const TOP_H  = 130;          // headline zone
    const BOT_H  = 80;           // bottom padding
    const IMG_W  = W - MARGIN*2; // 860px product zone
    const IMG_H  = H - TOP_H - BOT_H;

    // Load &amp; draw product image
    const mainImg = new Image(); mainImg.src = imgObj.data;
    await new Promise(r=&gt;{mainImg.onload=r; mainImg.onerror=r;});
    await document.fonts.ready; // ensure Barlow loaded before canvas text
    const scale = Math.min(IMG_W / mainImg.width, IMG_H / mainImg.height);
    const iw = mainImg.width*scale, ih = mainImg.height*scale;
    const ix = MARGIN + (IMG_W-iw)/2;    // centered within product zone
    const iy = TOP_H  + (IMG_H-ih)/2;
    ctx.drawImage(mainImg, ix, iy, iw, ih);

    // Headline
    ctx.fillStyle=cM; ctx.textAlign=&#x27;center&#x27;;
    ctx.font=&quot;900 68px &#x27;Barlow&#x27;,sans-serif&quot;;
    ctx.fillText(ai.headline.toUpperCase(), W/2, 120);

    // ── Callout layout ──
    const cues = Array.isArray(ai?.visualCues) ? ai.visualCues : [];
    const leftCues  = cues.filter(c=&gt;c.x&lt;=50).sort((a,b)=&gt;a.y-b.y);
    const rightCues = cues.filter(c=&gt;c.x&gt;50).sort((a,b)=&gt;a.y-b.y);

    // Icon+label block dimensions
    const ICON_R = 31;   // icon circle radius (×1.2)
    const LBL_FS = 38;   // label font size (reduced to fit margin)
    const LBL_LH = 48;   // label line height
    const BLOCK_H= ICON_R*2 + 10 + LBL_FS*4 + 20; // ~220px per block (4 lines)

    // Spread blocks evenly within image height
    function blockYs(n) {
        if(n===0) return [];
        const total = IMG_H - 40;
        const step  = total / n;
        return Array.from({length:n}, (_,i)=&gt; TOP_H + 20 + step*(i+0.5));
    }

    const leftYs  = blockYs(leftCues.length);
    const rightYs = blockYs(rightCues.length);

    function drawCallout(cue, idx, isL, blockY) {
        // Dot position on product
        const dotX = ix + (cue.x/100)*iw;
        const dotY = iy + (cue.y/100)*ih;

        // Block position in margin
        const blockCX = isL ? MARGIN/2 : W - MARGIN/2;
        const iconCY  = blockY;
        const lineEndX= isL ? MARGIN-4 : W-MARGIN+4;

        // ── Line: dot → step → block ──
        ctx.strokeStyle = cM; ctx.lineWidth = 1.8; ctx.setLineDash([6,5]);
        ctx.beginPath();
        ctx.moveTo(dotX, dotY);
        ctx.lineTo(lineEndX, iconCY);  // straight diagonal to margin edge
        ctx.stroke();
        ctx.setLineDash([]);

        // ── Dot ──
        ctx.fillStyle = cM;
        ctx.beginPath(); ctx.arc(dotX, dotY, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = &#x27;#fff&#x27;;
        ctx.beginPath(); ctx.arc(dotX, dotY, 3.5, 0, Math.PI*2); ctx.fill();

        // ── Icon circle bg ──
        ctx.fillStyle = hexAlpha(cM, 0.10);
        ctx.beginPath(); ctx.arc(blockCX, iconCY, ICON_R+6, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = hexAlpha(cM, 0.35); ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(blockCX, iconCY, ICON_R+6, 0, Math.PI*2); ctx.stroke();

        // ── Icon ──
        const cueIdx = cues.indexOf(cue);
        const customImg = customIcons &amp;&amp; customIcons[cueIdx];
        if(customImg) {
            ctx.save(); ctx.beginPath(); ctx.arc(blockCX, iconCY, ICON_R, 0, Math.PI*2); ctx.clip();
            ctx.drawImage(customImg, blockCX-ICON_R, iconCY-ICON_R, ICON_R*2, ICON_R*2);
            ctx.restore();
        } else {
            drawIconImage(ctx, cue.iconKey||&#x27;mesh_lace&#x27;, blockCX, iconCY, ICON_R*2);
        }

        // ── Label — 4 words per line, max 4 lines (14 words), supports lblOffsetY ──
        const lblOffsetY = cue.lblOffsetY || 0;
        const labelTop = iconCY + ICON_R + 14 + lblOffsetY;
        ctx.fillStyle = cT;
        ctx.font = `300 ${LBL_FS}px &#x27;Barlow&#x27;,sans-serif`;

        // Left labels: left-aligned from x=14 (never overflow left edge)
        // Right labels: right-aligned from x=W-14 (never overflow right edge)
        const txtX     = isL ? 14 : W - 14;
        const txtAlign = isL ? &#x27;left&#x27; : &#x27;right&#x27;;
        ctx.textAlign  = txtAlign;

        // Split into groups of 4 words, max 14 words total
        const allWords = cue.label.toLowerCase().replace(/,/g,&#x27;&#x27;).split(/\s+/).filter(Boolean).slice(0,14);
        const lines = [];
        for(let i=0; i&lt;allWords.length; i+=4){
            lines.push(allWords.slice(i,i+4).join(&#x27; &#x27;));
        }
        lines.forEach((ln,li) =&gt; ctx.fillText(ln, txtX, labelTop + li*LBL_LH + LBL_FS));
    }

    leftCues.forEach((c,i)  =&gt; drawCallout(c, i, true,  leftYs[i]));
    rightCues.forEach((c,i) =&gt; drawCallout(c, i, false, rightYs[i]));
}

function wrap(ctx,text,x,y,lh){
    const words=text.split(/\s+/).filter(w=&gt;w.length&gt;0); let lines=[];
    if(words.length&lt;=5){lines.push(words.join(&#x27; &#x27;));}
    else{let pos=0;while(pos&lt;words.length){let rem=words.length-pos;if(rem===5){lines.push(words.slice(pos,pos+5).join(&#x27; &#x27;));pos+=5;}else if(rem&gt;5){lines.push(words.slice(pos,pos+4).join(&#x27; &#x27;));pos+=4;}else{lines.push(words.slice(pos).join(&#x27; &#x27;));pos=words.length;}}}
    ctx.textBaseline=&quot;alphabetic&quot;;
    for(let i=lines.length-1;i&gt;=0;i--)ctx.fillText(lines[i],x,y-(lines.length-1-i)*lh);
}

async function mcTintImage(src, color) {
    return new Promise(res =&gt; {
        const img = new Image();
        // NO crossOrigin — data URLs don&#x27;t need it and it breaks loading
        img.onload = () =&gt; {
            const SIZE = 120;
            const c = document.createElement(&#x27;canvas&#x27;);
            c.width = SIZE; c.height = SIZE;
            const ctx = c.getContext(&#x27;2d&#x27;);

            // Draw scaled &amp; centered
            const s = Math.min(SIZE / (img.naturalWidth||1), SIZE / (img.naturalHeight||1));
            const dw = img.naturalWidth * s, dh = img.naturalHeight * s;
            ctx.drawImage(img, (SIZE-dw)/2, (SIZE-dh)/2, dw, dh);

            // Parse accent color
            const cr = parseInt(color.slice(1,3),16)||74;
            const cg = parseInt(color.slice(3,5),16)||124;
            const cb = parseInt(color.slice(5,7),16)||89;

            // Pixel-level recolor:
            //  - white/light pixels → transparent (remove background)
            //  - dark/icon pixels   → accent color, alpha = darkness
            const id = ctx.getImageData(0, 0, SIZE, SIZE);
            const d = id.data;
            for(let i = 0; i &lt; d.length; i += 4) {
                const r = d[i], g = d[i+1], b = d[i+2], a = d[i+3];
                if(a &lt; 10) continue; // already transparent
                const lum = r*0.299 + g*0.587 + b*0.114;
                const whiteness = Math.min(r, g, b); // high = white-ish
                if(whiteness &gt; 230 &amp;&amp; a &gt; 200) {
                    // White background pixel → transparent
                    d[i+3] = 0;
                } else {
                    // Icon pixel → recolor to accent
                    const intensity = (1 - lum/255) * (a/255);
                    d[i]   = cr;
                    d[i+1] = cg;
                    d[i+2] = cb;
                    d[i+3] = Math.min(255, Math.round(intensity * 300));
                }
            }
            ctx.putImageData(id, 0, 0);
            res(c.toDataURL(&#x27;image/png&#x27;));
        };
        img.onerror = () =&gt; {
            // Fallback: show original
            res(src);
        };
        img.src = src;
    });
}

async function mcExport(tam) {
    const btn = tam===1 ? $(&#x27;mc-exp-btn&#x27;) : $(&#x27;mc-exp-btn2&#x27;);
    const code = ($(&#x27;mc-prod-code&#x27;) ? $(&#x27;mc-prod-code&#x27;).value : &#x27;product&#x27;).trim() || &#x27;product&#x27;;
    btn.textContent = &#x27;⏳ Xuất...&#x27;;
    try {
        const card  = $(&#x27;mc-card&#x27;);
        const SCALE = 4; // 4× = 1080px wide
        const bgCol = $(&#x27;mc-c-bg&#x27;) ? $(&#x27;mc-c-bg&#x27;).value : &#x27;#ffffff&#x27;;

        // Render toàn bộ card 1 lần (bao gồm hình 3D)
        const full = await html2canvas(card, {
            scale: SCALE,
            useCORS: true,
            allowTaint: true,
            backgroundColor: bgCol,
            logging: false,
            scrollX: -window.scrollX,
            scrollY: -window.scrollY,
            width:  card.offsetWidth,
            height: card.scrollHeight,
        });

        // Điểm cắt: top của sec2 (tính từ top card, tránh lỗi scroll)
        const sec2 = card.querySelector(&#x27;.mcc-sec2&#x27;);
        const splitY = Math.round((sec2.getBoundingClientRect().top - card.getBoundingClientRect().top) * SCALE);

        const srcY = tam===1 ? 0      : splitY;
        const srcH = tam===1 ? splitY : full.height - splitY;
        const fname = `${code}_${tam}.png`;

        // Output canvas: luôn 3:4 = 1080×1440
        const outW = full.width; // 1080
        const outH = Math.round(outW * 4 / 3); // 1440

        const out = document.createElement(&#x27;canvas&#x27;);
        out.width  = outW;
        out.height = outH;
        const ctx  = out.getContext(&#x27;2d&#x27;);

        // Nền
        ctx.fillStyle = bgCol;
        ctx.fillRect(0, 0, outW, outH);

        // Fit nội dung vào canvas 3:4 — scale xuống nếu cần, căn giữa
        const fitScale = Math.min(outW / outW, outH / srcH); // = min(1, outH/srcH)
        const drawW = Math.round(outW * fitScale);
        const drawH = Math.round(srcH * fitScale);
        const dx    = Math.round((outW - drawW) / 2);
        const dy    = Math.round((outH - drawH) / 2);
        ctx.drawImage(full, 0, srcY, outW, srcH, dx, dy, drawW, drawH);

        // Format currency in Vietnamese Dong
        function formatVND(value) {
            if (value &gt;= 1000000000) {
                return `${(value / 1000000000).toFixed(1)}B VND`;
            }
            if (value &gt;= 1000000) {
                return `${(value / 1000000).toFixed(1)}M VND`;
            }
            if (value &gt;= 1000) {
                return `${(value / 1000).toFixed(1)}K VND`;
            }
            return `${value.toFixed(0)} VND`;
        }

        // Format value based on unit
        function formatValue(value, unit) {
            if (unit === &#x27;VND&#x27;) return formatVND(value);
            if (unit === &#x27;%&#x27;) return `${value.toFixed(2)}%`;
            // Handle large count values
            if (unit === &#x27;count&#x27; &amp;&amp; value &gt;= 1000000) {
                return `${(value / 1000000).toFixed(1)}M`;
            }
            if (unit === &#x27;count&#x27; &amp;&amp; value &gt;= 1000) {
                return `${(value / 1000).toFixed(1)}K`;
            }
            return value.toFixed(0);
        }

        // Calculate metrics based on input data
        function calculateMetrics(inputData) {
            const calculatedData = { ...inputData };
            
            Object.entries(metricsConfig).forEach(([metric, config]) =&gt; {
                if (config.type === &#x27;calculated&#x27; &amp;&amp; config.formula) {
                    calculatedData[metric] = config.formula(inputData);
                }
            });
            
            return calculatedData;
        }

        // Calculate percentage change for MOM comparison
        function calculatePercentageChange(current, previous) {
            if (!previous || previous === 0) return 0;
            return ((current - previous) / previous) * 100;
        }

        // Enhanced comparison badge with good/bad performance logic
        function createComparisonBadge(change, metricName) {
            let icon, className;
            const metricConfig = metricsConfig[metricName];
            const goodDirection = metricConfig ? metricConfig.goodDirection : &#x27;higher&#x27;;
            
            // Determine if change is good or bad based on metric type
            let isGood = false;
            if (goodDirection === &#x27;higher&#x27;) {
                isGood = change &gt; 0;
            } else if (goodDirection === &#x27;lower&#x27;) {
                isGood = change &lt; 0;
            }
            
            if (Math.abs(change) &gt; 5) {
                if (isGood) {
                    icon = &#x27;fas fa-arrow-up&#x27;;
                    className = &#x27;comparison-positive&#x27;;
                } else {
                    icon = &#x27;fas fa-arrow-down&#x27;;
                    className = &#x27;comparison-negative&#x27;;
                }
            } else {
                icon = &#x27;fas fa-minus&#x27;;
                className = &#x27;comparison-neutral&#x27;;
            }

            return `
                &lt;span class=&quot;${className} comparison-badge&quot;&gt;
                    &lt;i class=&quot;${icon}&quot;&gt;&lt;/i&gt;
                    ${change &gt; 0 ? &#x27;+&#x27; : &#x27;&#x27;}${change.toFixed(1)}%
                &lt;/span&gt;
            `;
        }

        // Show notification helper
        function showNotification(message, type = &#x27;success&#x27;) {
            const notification = document.createElement(&#x27;div&#x27;);
            const bgColor = type === &#x27;success&#x27; ? &#x27;bg-green-500&#x27; : &#x27;bg-red-500&#x27;;
            const icon = type === &#x27;success&#x27; ? &#x27;fas fa-check&#x27; : &#x27;fas fa-exclamation-triangle&#x27;;
            
            notification.className = `fixed top-4 right-4 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg z-50`;
            notification.innerHTML = `&lt;i class=&quot;${icon} mr-2&quot;&gt;&lt;/i&gt;${message}`;
            document.body.appendChild(notification);
            setTimeout(() =&gt; {
                if (document.body.contains(notification)) {
                    document.body.removeChild(notification);
                }
            }, 3000);
        }

        function showStatusMessage(containerId, message, type = &#x27;success&#x27;) {

                const sampleData = baseSampleData.map(row =&gt; {

                    const adjustedRow = { ...row };
                    Object.keys(adjustedRow).forEach(key =&gt; {
                        if (key !== &#x27;date&#x27; &amp;&amp; key !== &#x27;type&#x27; &amp;&amp; typeof adjustedRow[key] === &#x27;number&#x27;) {
                            adjustedRow[key] = Math.round(adjustedRow[key] * multiplier);
                        }
                    });
                    return adjustedRow;

                // Create Excel file and download
                const worksheet = XLSX.utils.json_to_sheet(sampleData);

                showNotification(`Đã tải file mẫu ${dataType} với Target &amp; MOM data`, &#x27;success&#x27;);
                
            } catch (error) {
                console.error(&#x27;Error generating sample file:&#x27;, error);
                showNotification(`Lỗi khi tạo file mẫu: ${error.message}`, &#x27;error&#x27;);

        // Enhanced file upload handler
        function handleFileUpload(event, dataType) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const workbook = XLSX.read(e.target.result, { type: &#x27;binary&#x27; });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: &quot;&quot; });

                    const processedData = jsonData.map(row =&gt; calculateMetrics(row));
                    
                    // Separate Target, Compare, and other data
                    processedData.forEach(row =&gt; {
                        const dateStr = (row.date || row.Date || &#x27;&#x27;).toString().toLowerCase();
                        const typeStr = (row.type || &#x27;&#x27;).toString().toLowerCase();
                        
                        if (dateStr.includes(&#x27;target&#x27;) || typeStr.includes(&#x27;target&#x27;)) {
                            if (!targetData[dataType]) targetData[dataType] = {};
                            targetData[dataType] = row;
                        } else if (dateStr.includes(&#x27;compare&#x27;) || typeStr.includes(&#x27;compare&#x27;) || 
                                 dateStr.includes(&#x27;mom&#x27;) || typeStr.includes(&#x27;mom&#x27;)) {
                            if (!compareData[dataType]) compareData[dataType] = {};
                            compareData[dataType] = row;
                        }
                    });
                    
                    uploadedData[dataType] = processedData;
                    
                    document.getElementById(`status-${dataType}`).innerHTML = 
                        `&lt;span class=&quot;status-badge&quot;&gt;✓ ${processedData.length} rows uploaded&lt;/span&gt;`;
                    
                    if (!selectedDataTypes.includes(dataType)) {
                        selectedDataTypes.push(dataType);
                    }
                    
                    updateDataTypeSelection();
                    updatePivotData();
                    updateRunRateOverview(); // NEW: Update Run Rate Overview on data load
                } catch (error) {
                    showNotification(`Lỗi khi đọc file Excel: ${error.message}`, &#x27;error&#x27;);
                }
            };
            reader.readAsBinaryString(file);
        }

        // Update data type selection
        function updateDataTypeSelection() {
            const container = document.getElementById(&#x27;dataTypeCheckboxes&#x27;);
            container.innerHTML = &#x27;&#x27;;
            
            const dataTypes = [&#x27;BAU&#x27;, &#x27;Double day&#x27;, &#x27;15th, 25th&#x27;];

                if (uploadedData[dataType]) {
                    const label = document.createElement(&#x27;label&#x27;);
                    label.className = &#x27;flex items-center cursor-pointer&#x27;;

                        &lt;input type=&quot;checkbox&quot; ${selectedDataTypes.includes(dataType) ? &#x27;checked&#x27; : &#x27;&#x27;} 
                               onchange=&quot;toggleDataType(&#x27;${dataType}&#x27;)&quot; class=&quot;mr-3 scale-125&quot;&gt;

                    container.appendChild(label);

            });
            
            if (Object.keys(uploadedData).length &gt; 0) {
                document.getElementById(&#x27;dataTypeSelection&#x27;).style.display = &#x27;block&#x27;;
            }
        }

        // Toggle data type selection
        function toggleDataType(dataType) {
            if (selectedDataTypes.includes(dataType)) {
                selectedDataTypes = selectedDataTypes.filter(t =&gt; t !== dataType);
            } else {
                selectedDataTypes.push(dataType);
            }
            updatePivotData();
            updateRunRateOverview(); // NEW: Update Run Rate Overview on selection change
        }

        // Update pivot data with enhanced MOM comparison
        function updatePivotData() {

                document.getElementById(&#x27;performanceHighlights&#x27;).style.display = &#x27;none&#x27;;
                document.getElementById(&#x27;runRateOverview&#x27;).style.display = &#x27;none&#x27;; // NEW: Hide Run Rate
                return;
            }

            const pivot = {};
            selectedDataTypes.forEach(dataType =&gt; {
                if (uploadedData[dataType]) {
                    uploadedData[dataType].forEach(row =&gt; {

        // Identify bad performance metrics với logic tốt/xấu chi tiết
        function identifyBadPerformanceMetrics() {
            if (!pivotData) return [];

            const badMetrics = [];
            const todayData = pivotData[&#x27;Today&#x27;];
            const compareData = pivotData[&#x27;Compare MOM&#x27;];
            
            if (!todayData || !compareData) return [];

            Object.keys(metricsConfig).forEach(metric =&gt; {
                selectedDataTypes.forEach(dataType =&gt; {
                    const currentValue = todayData[dataType]?.[metric];
                    const previousValue = compareData[dataType]?.[metric];
                    const targetValue = pivotData[&#x27;Target&#x27;]?.[dataType]?.[metric];
                    const metricConfig = metricsConfig[metric];

                    if (currentValue !== undefined &amp;&amp; previousValue !== undefined &amp;&amp; metricConfig) {
                        const change = calculatePercentageChange(currentValue, previousValue);
                        const goodDirection = metricConfig.goodDirection;
                        
                        // Xác định metric có performance xấu hay không
                        let isBadPerformance = false;
                        
                        if (goodDirection === &#x27;higher&#x27;) {
                            // Với metrics càng cao càng tốt (GMV, Order, CR, etc.)
                            isBadPerformance = change &lt; -5; // Giảm &gt; 5% là xấu
                        } else if (goodDirection === &#x27;lower&#x27;) {
                            // Với metrics càng thấp càng tốt (Cost, CIR, CPC, etc.)
                            isBadPerformance = change &gt; 5; // Tăng &gt; 5% là xấu
                        }
                        
                        // Kiểm tra so với target (nếu có)
                        const isBelowTarget = targetValue ? 
                            (goodDirection === &#x27;higher&#x27; ? (currentValue / targetValue) &lt; 0.9 : 
                             goodDirection === &#x27;lower&#x27; ? (currentValue / targetValue) &gt; 1.1 : false) : 
                            false;
                        
                        if (isBadPerformance || isBelowTarget) {
                            badMetrics.push({
                                name: `${metric} (${dataType})`,
                                current: currentValue,
                                previous: previousValue,
                                target: targetValue,
                                change: change,
                                unit: metricConfig.unit,
                                category: metricConfig.category,
                                goodDirection: goodDirection,
                                reason: isBadPerformance ? &#x27;MOM Performance&#x27; : &#x27;Below Target&#x27;
                            });
                        }
                    }
                });
            });

            return badMetrics.sort((a, b) =&gt; {
                // Sắp xếp theo mức độ nghiêm trọng
                if (a.goodDirection === &#x27;higher&#x27;) {
                    return a.change - b.change; // Metric giảm nhiều nhất lên đầu
                } else {
                    return b.change - a.change; // Metric tăng nhiều nhất lên đầu
                }
            });
        }

        // Enhanced pivot table với group theo category
        function renderPivotTable() {
            if (!pivotData) return;

            const dates = Object.keys(pivotData).sort((a, b) =&gt; {
                // Sort order: Target, Compare MOM, Today, then others
                if (a.includes(&#x27;Target&#x27;)) return -1;
                if (b.includes(&#x27;Target&#x27;)) return 1;
                if (a.includes(&#x27;Compare&#x27;)) return -1;
                if (b.includes(&#x27;Compare&#x27;)) return 1;
                if (a.includes(&#x27;Today&#x27;)) return -1;
                if (b.includes(&#x27;Today&#x27;)) return 1;
                return a.localeCompare(b);
            });
            
            // Group metrics by category
            const metricsGrouped = {};
            Object.entries(metricsConfig).forEach(([metric, config]) =&gt; {
                const category = config.category || &#x27;Other&#x27;;
                if (!metricsGrouped[category]) metricsGrouped[category] = [];
                metricsGrouped[category].push(metric);
            });
            
            let tableHTML = `
                &lt;thead class=&quot;bg-gradient-to-r from-purple-500 to-blue-500 text-white&quot;&gt;
                    &lt;tr&gt;
                        &lt;th class=&quot;px-6 py-4 text-left text-sm font-semibold rounded-tl-2xl&quot;&gt;Category / Metric&lt;/th&gt;
                        ${dates.map((date, index) =&gt; `
                            &lt;th class=&quot;px-6 py-4 text-left text-sm font-semibold ${index === dates.length - 1 ? &#x27;rounded-tr-2xl&#x27; : &#x27;&#x27;}&quot;&gt;
                                ${date}
                                ${date.includes(&#x27;Today&#x27;) ? &#x27;&lt;br&gt;&lt;small&gt;vs MOM&lt;/small&gt;&#x27; : &#x27;&#x27;}
                            &lt;/th&gt;
                        `).join(&#x27;&#x27;)}
                    &lt;/tr&gt;
                &lt;/thead&gt;
                &lt;tbody&gt;
            `;

            let rowIndex = 0;
            Object.entries(metricsGrouped).forEach(([category, metrics]) =&gt; {
                // Category header row
                const bgClass = rowIndex % 2 === 0 ? &#x27;bg-blue-50&#x27; : &#x27;bg-purple-50&#x27;;
                tableHTML += `
                    &lt;tr class=&quot;${bgClass}&quot;&gt;
                        &lt;td colspan=&quot;${dates.length + 1}&quot; class=&quot;px-6 py-3 font-bold text-lg text-blue-800 border-b-2 border-blue-200&quot;&gt;
                            &lt;i class=&quot;fas fa-folder-open mr-2&quot;&gt;&lt;/i&gt;${category}
                        &lt;/td&gt;
                    &lt;/tr&gt;
                `;
                rowIndex++;

                // Metrics rows for this category
                metrics.forEach((metric) =&gt; {
                    const bgClass = rowIndex % 2 === 0 ? &#x27;bg-gray-50&#x27; : &#x27;bg-white&#x27;;
                    tableHTML += `&lt;tr class=&quot;hover:bg-blue-50 transition-colors ${bgClass}&quot;&gt;
                        &lt;td class=&quot;px-6 py-4 text-sm font-semibold text-readable pl-12&quot;&gt;
                            &lt;span class=&quot;text-gray-600 mr-2&quot;&gt;└─&lt;/span&gt;${metric}
                        &lt;/td&gt;`;
                    
                    dates.forEach(date =&gt; {
                        tableHTML += &#x27;&lt;td class=&quot;px-6 py-4 text-sm&quot;&gt;&#x27;;
                        
                        selectedDataTypes.forEach((dataType, index) =&gt; {
                            const value = pivotData[date]?.[dataType]?.[metric];
                            
                            if (value !== undefined) {
                                // Calculate MOM comparison for Today data
                                let comparisonHTML = &#x27;&#x27;;
                                if (date.includes(&#x27;Today&#x27;)) {
                                    const compareValue = pivotData[&#x27;Compare MOM&#x27;]?.[dataType]?.[metric];
                                    if (compareValue !== undefined) {
                                        const change = calculatePercentageChange(value, compareValue);
                                        comparisonHTML = `&lt;div class=&quot;mt-2&quot;&gt;${createComparisonBadge(change, metric)}&lt;/div&gt;`;
                                    }
                                }

                                const cardBgClass = date.includes(&#x27;Target&#x27;) ? &#x27;bg-blue-100 border-blue-300&#x27; :
                                                  date.includes(&#x27;Compare&#x27;) ? &#x27;bg-yellow-100 border-yellow-300&#x27; :
                                                  date.includes(&#x27;Today&#x27;) ? &#x27;bg-green-100 border-green-300&#x27; :
                                                  &#x27;bg-gray-100 border-gray-300&#x27;;

                                tableHTML += `
                                    &lt;div class=&quot;metric-cell ${cardBgClass} border&quot; onclick=&quot;showMetricChart(&#x27;${metric}&#x27;, &#x27;${dataType}&#x27;)&quot;&gt;
                                        &lt;div class=&quot;metric-label&quot;&gt;${dataType}&lt;/div&gt;
                                        &lt;div class=&quot;metric-value&quot;&gt;${formatValue(value, metricsConfig[metric]?.unit || &#x27;count&#x27;)}&lt;/div&gt;
                                        ${comparisonHTML}
                                    &lt;/div&gt;
                                `;
                            }
                        });
                        tableHTML += &#x27;&lt;/td&gt;&#x27;;
                    });
                    
                    tableHTML += &#x27;&lt;/tr&gt;&#x27;;
                    rowIndex++;
                });
            });

            tableHTML += &#x27;&lt;/tbody&gt;&#x27;;
            document.getElementById(&#x27;pivotTable&#x27;).innerHTML = tableHTML;
        }

        // Enhanced AI insights generation with UPDATED Gemini API
        async function generateInsights() {
            const geminiApiKey = document.getElementById(&#x27;geminiApiKey&#x27;).value.trim();
            
            // Clear previous status
            document.getElementById(&#x27;insightStatus&#x27;).innerHTML = &#x27;&#x27;;
            
            if (!geminiApiKey) {
                showStatusMessage(&#x27;insightStatus&#x27;, &#x27;Vui lòng nhập Gemini API Key&#x27;, &#x27;error&#x27;);
                return;
            }
            
            if (!pivotData) {
                showStatusMessage(&#x27;insightStatus&#x27;, &#x27;Vui lòng tải dữ liệu trước khi tạo insights&#x27;, &#x27;error&#x27;);
                return;
            }

            const button = document.getElementById(&#x27;insightButtonText&#x27;);
            const originalText = button.innerHTML;
            button.innerHTML = &#x27;&lt;i class=&quot;fas fa-spinner loading mr-2&quot;&gt;&lt;/i&gt;Đang tạo Insights...&#x27;;
            
            try {
                // Show API key validation
                showStatusMessage(&#x27;apiKeyStatus&#x27;, &#x27;Đang xác thực API Key...&#x27;, &#x27;success&#x27;);
                
                const analysisData = prepareAnalysisData();
                
                if (!analysisData || Object.keys(analysisData).length === 0) {
                    throw new Error(&#x27;Không có dữ liệu để phân tích&#x27;);
                }
                
                const dataForAnalysis = JSON.stringify(analysisData, null, 2);
                
                const prompt = `
                    Bạn là một chuyên gia phân tích thương mại điện tử. Hãy phân tích dữ liệu sau và đưa ra insights chi tiết bằng tiếng Việt.

                    Dữ liệu bao gồm:
                    - Target: Mục tiêu đặt ra
                    - Compare MOM: Dữ liệu tháng trước (Month over Month)
                    - Today: Dữ liệu hiện tại
                    - Historical: Dữ liệu lịch sử

                    Hãy phân tích và đưa ra:
                    1. Những metric performance tốt nhất
                    2. Những metric cần cải thiện
                    3. So sánh với target và MOM
                    4. Đề xuất action cụ thể cho từng vấn đề
                    5. Dự đoán xu hướng

                    Dữ liệu: ${dataForAnalysis}
                `;

                showStatusMessage(&#x27;insightStatus&#x27;, &#x27;Đang gửi yêu cầu đến Gemini AI...&#x27;, &#x27;success&#x27;);

                // --- UPDATED API ENDPOINT AND MODEL ---
                const apiKey = geminiApiKey; // Use the provided API key
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        temperature: 0.7,
                        topK: 40,
                        topP: 0.95,
                        // Tăng Max output tokens để đảm bảo nội dung dài được truyền tải hết
                        maxOutputTokens: 8192 // Tăng lên mức tối đa có thể để chứa nội dung dài
                    }
                };
                
                // Exponential Backoff implementation
                const maxRetries = 3;
                let attempt = 0;
                let data = null;
                
                while (attempt &lt; maxRetries) {
                    try {
                        const response = await fetch(apiUrl, {
                            method: &#x27;POST&#x27;,
                            headers: {
                                &#x27;Content-Type&#x27;: &#x27;application/json&#x27;,
                            },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            const errorText = await response.text();
                            let errorMessage = `HTTP error! status: ${response.status}`;
                            
                            try {
                                const errorData = JSON.parse(errorText);
                                if (errorData.error &amp;&amp; errorData.error.message) {
                                    errorMessage = errorData.error.message;
                                }
                            } catch (e) {
                                // Keep original error message if JSON parsing fails
                            }
                            
                            // Check for retryable errors (429, 500, 503)
                            if (response.status === 429 || response.status &gt;= 500) {
                                if (attempt &lt; maxRetries - 1) {
                                    const delay = Math.pow(2, attempt) * 1000 + Math.random() * 1000;
                                    await new Promise(resolve =&gt; setTimeout(resolve, delay));
                                    attempt++;
                                    continue; // Retry
                                }
                            }
                            
                            throw new Error(errorMessage);
                        }

                        data = await response.json();
                        break; // Success, exit loop

                    } catch (error) {
                        if (attempt &lt; maxRetries - 1) {
                            const delay = Math.pow(2, attempt) * 1000 + Math.random() * 1000;
                            await new Promise(resolve =&gt; setTimeout(resolve, delay));
                            attempt++;
                            continue; // Retry
                        }
                        throw error; // Throw error after final attempt
                    }
                }
                
                // Process successful response
                if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) {
                    throw new Error(&#x27;Không nhận được phản hồi hợp lệ từ Gemini AI&#x27;);
                }

                const insights = data.candidates[0].content.parts[0].text;

                // Display insights
                document.getElementById(&#x27;insightsContent&#x27;).textContent = insights;
                document.getElementById(&#x27;insightsSection&#x27;).style.display = &#x27;block&#x27;;

                // Generate structured insights table
                generateStructuredInsights();
                
                showStatusMessage(&#x27;insightStatus&#x27;, &#x27;AI Insights đã được tạo thành công!&#x27;, &#x27;success&#x27;);
                showStatusMessage(&#x27;apiKeyStatus&#x27;, &#x27;API Key hợp lệ và hoạt động tốt&#x27;, &#x27;success&#x27;);
                
            } catch (error) {
                console.error(&#x27;Error generating insights:&#x27;, error);
                let errorMessage = &#x27;Lỗi không xác định&#x27;;
                
                if (error.message.includes(&#x27;API_KEY_INVALID&#x27;) || error.message.includes(&#x27;403&#x27;)) {
                    errorMessage = &#x27;API Key không hợp lệ. Vui lòng kiểm tra lại.&#x27;;
                    showStatusMessage(&#x27;apiKeyStatus&#x27;, errorMessage, &#x27;error&#x27;);
                } else if (error.message.includes(&#x27;QUOTA_EXCEEDED&#x27;) || error.message.includes(&#x27;429&#x27;)) {
                    errorMessage = &#x27;Đã vượt quá giới hạn sử dụng API. Vui lòng thử lại sau.&#x27;;
                } else if (error.message.includes(&#x27;Failed to fetch&#x27;)) {
                    errorMessage = &#x27;Không thể kết nối đến API. Kiểm tra kết nối internet.&#x27;;
                } else if (error.message.includes(&#x27;NOT_FOUND&#x27;)) {
                    errorMessage = &#x27;Model không tìm thấy. Đã sử dụng gemini-2.5-flash.&#x27;;
                } else {
                    errorMessage = error.message;
                }
                
                showStatusMessage(&#x27;insightStatus&#x27;, `Lỗi khi tạo insights: ${errorMessage}`, &#x27;error&#x27;);
            } finally {
                button.innerHTML = originalText;
            }
        }

        // Prepare analysis data for AI with better structure
        function prepareAnalysisData() {
            if (!pivotData) return {};

            const analysis = {
                summary: {},
                comparison: {},
                performance: {},
                dataTypes: selectedDataTypes
            };

            // Calculate summary statistics
            selectedDataTypes.forEach(dataType =&gt; {
                analysis.summary[dataType] = {};
                
                Object.keys(metricsConfig).forEach(metric =&gt; {
                    const currentValue = pivotData[&#x27;Today&#x27;]?.[dataType]?.[metric];
                    const compareValue = pivotData[&#x27;Compare MOM&#x27;]?.[dataType]?.[metric];
                    const targetValue = pivotData[&#x27;Target&#x27;]?.[dataType]?.[metric];
                    
                    if (currentValue !== undefined) {
                        analysis.summary[dataType][metric] = {
                            current: currentValue,
                            target: targetValue,
                            compare: compareValue,
                            unit: metricsConfig[metric]?.unit || &#x27;count&#x27;,
                            category: metricsConfig[metric]?.category || &#x27;Other&#x27;
                        };

                        if (compareValue !== undefined) {
                            const change = calculatePercentageChange(currentValue, compareValue);
                            analysis.comparison[`${metric}_${dataType}`] = {
                                metric: metric,
                                dataType: dataType,
                                change: change,
                                direction: metricsConfig[metric]?.goodDirection || &#x27;higher&#x27;,
                                isGood: metricsConfig[metric]?.goodDirection === &#x27;higher&#x27; ? change &gt; 0 : change &lt; 0
                            };
                        }
                    }
                });
            });

            // Add performance summary
            const badMetrics = identifyBadPerformanceMetrics();
            const goodMetrics = identifyGoodPerformanceMetrics();
            
            analysis.performance = {
                badMetricsCount: badMetrics.length,
                goodMetricsCount: goodMetrics.length,
                badMetrics: badMetrics.slice(0, 5).map(m =&gt; ({
                    name: m.name,
                    change: m.change,
                    category: m.category
                })),
                goodMetrics: goodMetrics.slice(0, 5).map(m =&gt; ({
                    name: m.name,
                    change: m.change,
                    category: m.category
                }))
            };

            return analysis;
        }

        // Generate structured insights table
        function generateStructuredInsights() {
            const tableBody = document.getElementById(&#x27;insightsTableBody&#x27;);
            tableBody.innerHTML = &#x27;&#x27;;

            const badMetrics = identifyBadPerformanceMetrics();
            const goodMetrics = identifyGoodPerformanceMetrics();

            // Add bad performance metrics first
            badMetrics.slice(0, 5).forEach(metric =&gt; {
                const row = document.createElement(&#x27;tr&#x27;);
                row.innerHTML = `
                    &lt;td class=&quot;metric-name&quot;&gt;${metric.name}&lt;/td&gt;
                    &lt;td class=&quot;highlight-text&quot;&gt;
                        &lt;div class=&quot;mb-2&quot;&gt;
                            &lt;span class=&quot;text-red-600 font-semibold&quot;&gt;Underperforming:&lt;/span&gt; 
                            ${createComparisonBadge(metric.change, metric.name.split(&#x27; (&#x27;)[0])}
                        &lt;/div&gt;
                        &lt;div class=&quot;text-sm&quot;&gt;
                            Current: &lt;strong&gt;${formatValue(metric.current, metric.unit)}&lt;/strong&gt;&lt;br&gt;
                            MOM: ${formatValue(metric.previous, metric.unit)}&lt;br&gt;
                            ${metric.target ? `Target: ${formatValue(metric.target, metric.unit)}` : &#x27;&#x27;}
                        &lt;/div&gt;
                    &lt;/td&gt;
                    &lt;td class=&quot;action-text&quot;&gt;
                        ${getActionRecommendation(metric)}
                    &lt;/td&gt;
                `;
                tableBody.appendChild(row);
            });

            // Add good performance metrics
            goodMetrics.slice(0, 3).forEach(metric =&gt; {
                const row = document.createElement(&#x27;tr&#x27;);
                row.innerHTML = `
                    &lt;td class=&quot;metric-name&quot;&gt;${metric.name}&lt;/td&gt;
                    &lt;td class=&quot;highlight-text&quot;&gt;
                        &lt;div class=&quot;mb-2&quot;&gt;
                            &lt;span class=&quot;text-green-600 font-semibold&quot;&gt;Strong Performance:&lt;/span&gt; 
                            ${createComparisonBadge(metric.change, metric.name.split(&#x27; (&#x27;)[0])}
                        &lt;/div&gt;
                        &lt;div class=&quot;text-sm&quot;&gt;
                            Current: &lt;strong&gt;${formatValue(metric.current, metric.unit)}&lt;/strong&gt;&lt;br&gt;
                            MOM: ${formatValue(metric.previous, metric.unit)}
                        &lt;/div&gt;
                    &lt;/td&gt;
                    &lt;td class=&quot;action-text&quot;&gt;
                        &lt;i class=&quot;fas fa-trophy text-yellow-500 mr-2&quot;&gt;&lt;/i&gt;
                        Maintain current strategy. Consider scaling successful tactics to underperforming areas.
                    &lt;/td&gt;
                `;
                tableBody.appendChild(row);
            });
        }

        // Identify good performance metrics
        function identifyGoodPerformanceMetrics() {
            if (!pivotData) return [];

            const goodMetrics = [];
            const todayData = pivotData[&#x27;Today&#x27;];
            const compareData = pivotData[&#x27;Compare MOM&#x27;];
            
            if (!todayData || !compareData) return [];

            Object.keys(metricsConfig).forEach(metric =&gt; {
                selectedDataTypes.forEach(dataType =&gt; {
                    const currentValue = todayData[dataType]?.[metric];
                    const previousValue = compareData[dataType]?.[metric];
                    const metricConfig = metricsConfig[metric];

                    if (currentValue !== undefined &amp;&amp; previousValue !== undefined &amp;&amp; metricConfig) {
                        const change = calculatePercentageChange(currentValue, previousValue);
                        const goodDirection = metricConfig.goodDirection;
                        
                        let isGoodPerformance = false;
                        
                        if (goodDirection === &#x27;higher&#x27;) {
                            isGoodPerformance = change &gt; 10; // Tăng &gt; 10% là tốt
                        } else if (goodDirection === &#x27;lower&#x27;) {
                            isGoodPerformance = change &lt; -10; // Giảm &gt; 10% là tốt
                        }
                        
                        if (isGoodPerformance) {
                            goodMetrics.push({
                                name: `${metric} (${dataType})`,
                                current: currentValue,
                                previous: previousValue,
                                change: change,
                                unit: metricConfig.unit,
                                category: metricConfig.category,
                                goodDirection: goodDirection
                            });
                        }
                    }
                });
            });

            return goodMetrics.sort((a, b) =&gt; {
                // Sắp xếp theo performance tốt nhất
                if (a.goodDirection === &#x27;higher&#x27;) {
                    return b.change - a.change; // Metric tăng nhiều nhất lên đầu
                } else {
                    return a.change - b.change; // Metric giảm nhiều nhất lên đầu
                }
            });
        }

        // Get action recommendation for metrics
        function getActionRecommendation(metric) {
            const category = metric.category;
            const metricName = metric.name.split(&#x27; (&#x27;)[0];
            
            const recommendations = {
                &#x27;Performance&#x27;: {
                    &#x27;Ad cost&#x27;: &#x27;🔍 Review ad targeting và bid strategy. Optimize cho high-converting keywords.&#x27;,
                    &#x27;Ad CIR&#x27;: &#x27;⚡ Improve ad creative quality và landing page conversion rate.&#x27;,
                    &#x27;CPC Paid Ad&#x27;: &#x27;🎯 Refine audience targeting, test ad scheduling và device targeting.&#x27;
                },
                &#x27;Doanh thu&#x27;: {
                    &#x27;Total GMV&#x27;: &#x27;📈 Launch promotional campaigns, expand product range, improve cross-selling.&#x27;,
                    &#x27;Ad GMV&#x27;: &#x27;🚀 Increase ad budget cho high-performing campaigns, A/B test ad creatives.&#x27;,
                    &#x27;Live GMV&#x27;: &#x27;📺 Enhance live streaming quality, train hosts, promote live events.&#x27;,
                    &#x27;Order&#x27;: &#x27;🛒 Optimize checkout process, reduce cart abandonment, offer incentives.&#x27;
                },
                &#x27;Traffic&#x27;: {
                    &#x27;Product click&#x27;: &#x27;🔗 Improve product titles, images, và SEO optimization.&#x27;,
                    &#x27;Ad Click&#x27;: &#x27;✨ Create more compelling ad copy và visual creatives.&#x27;,
                    &#x27;Unique User&#x27;: &#x27;📱 Expand marketing channels, improve brand awareness campaigns.&#x27;,
                    &#x27;ATC&#x27;: &#x27;🛍️ Optimize product pages, add social proof, improve product descriptions.&#x27;,
                    &#x27;View Live&#x27;: &#x27;📢 Increase live streaming promotion across all channels.&#x27;
                },
                &#x27;Chuyển đổi&#x27;: {
                    &#x27;CR of product click&#x27;: &#x27;🎯 A/B test product pages, improve trust signals, optimize pricing.&#x27;,
                    &#x27;CR of buyer&#x27;: &#x27;💰 Enhance user experience, simplify purchase flow, add payment options.&#x27;,
                    &#x27;Ad CR&#x27;: &#x27;🔄 Retarget website visitors, improve ad relevance score.&#x27;,
                    &#x27;CR Live&#x27;: &#x27;🎪 Train live hosts on sales techniques, create urgency in live sessions.&#x27;
                },
                &#x27;Giá trị đơn&#x27;: {
                    &#x27;AOV&#x27;: &#x27;📦 Implement bundle deals, cross-sell related products, minimum order incentives.&#x27;,
                    &#x27;ASP&#x27;: &#x27;💎 Focus on higher-margin products, improve product mix strategy.&#x27;,
                    &#x27;ABS&#x27;: &#x27;🛒 Encourage bulk purchases, offer volume discounts.&#x27;
                }
            };
            
            const categoryRecs = recommendations[category] || {};
            const specificRec = categoryRecs[metricName];
            
            if (specificRec) {
                return specificRec;
            }
            
            // Default recommendations by category
            const defaultRecs = {
                &#x27;Performance&#x27;: &#x27;🔧 Review campaign settings và optimize budget allocation.&#x27;,
                &#x27;Doanh thu&#x27;: &#x27;📊 Analyze sales funnel và identify revenue growth opportunities.&#x27;,
                &#x27;Traffic&#x27;: &#x27;🚦 Enhance marketing reach và improve user acquisition strategies.&#x27;,
                &#x27;Chuyển đổi&#x27;: &#x27;⚡ Optimize user journey và reduce conversion barriers.&#x27;,
                &#x27;Giá trị đơn&#x27;: &#x27;💰 Focus on increasing transaction value through strategic promotions.&#x27;
            };
            
            return defaultRecs[category] || &#x27;🎯 Monitor closely và develop improvement strategy.&#x27;;
        }

        // Export to Excel functionality
        function exportToExcel() {
            if (!pivotData) {
                showNotification(&#x27;Không có dữ liệu để xuất&#x27;, &#x27;error&#x27;);
                return;
            }

            try {
                const exportData = [];
                
                // Prepare data for export
                Object.entries(pivotData).forEach(([date, typeData]) =&gt; {
                    selectedDataTypes.forEach(dataType =&gt; {
                        const rowData = typeData[dataType];
                        if (rowData) {
                            const exportRow = {
                                Date: date,
                                Type: dataType,
                                ...rowData
                            };
                            
                            // Add MOM comparison if it&#x27;s Today data
                            if (date.includes(&#x27;Today&#x27;)) {
                                Object.keys(metricsConfig).forEach(metric =&gt; {
                                    const currentValue = rowData[metric];
                                    const compareValue = pivotData[&#x27;Compare MOM&#x27;]?.[dataType]?.[metric];
                                    
                                    if (currentValue !== undefined &amp;&amp; compareValue !== undefined) {
                                        const change = calculatePercentageChange(currentValue, compareValue);
                                        exportRow[`${metric}_MOM_Change_%`] = change.toFixed(2);
                                    }
                                });
                            }
                            
                            exportData.push(exportRow);
                        }
                    });
                });

                // Create insights summary sheet
                const insightsData = [];
                const badMetrics = identifyBadPerformanceMetrics();
                const goodMetrics = identifyGoodPerformanceMetrics();

                // Add performance summary
                insightsData.push({
                    Category: &#x27;SUMMARY&#x27;,
                    Metric: &#x27;Bad Performance Count&#x27;,
                    Value: badMetrics.length,
                    Note: &#x27;Metrics underperforming vs MOM&#x27;
                });

                insightsData.push({
                    Category: &#x27;SUMMARY&#x27;, 
                    Metric: &#x27;Good Performance Count&#x27;,
                    Value: goodMetrics.length,
                    Note: &#x27;Metrics outperforming vs MOM&#x27;
                });

                // Add detailed bad performance metrics
                badMetrics.forEach(metric =&gt; {
                    insightsData.push({
                        Category: &#x27;BAD_PERFORMANCE&#x27;,
                        Metric: metric.name,
                        Value: `${metric.change.toFixed(1)}%`,
                        Current: formatValue(metric.current, metric.unit),
                        Previous: formatValue(metric.previous, metric.unit),
                        Target: metric.target ? formatValue(metric.target, metric.unit) : &#x27;&#x27;,
                        Action: getActionRecommendation(metric),
                        Note: `${metric.category} - ${metric.reason}`
                    });
                });

                // Add good performance metrics
                goodMetrics.forEach(metric =&gt; {
                    insightsData.push({
                        Category: &#x27;GOOD_PERFORMANCE&#x27;,
                        Metric: metric.name,
                        Value: `${metric.change.toFixed(1)}%`,
                        Current: formatValue(metric.current, metric.unit),
                        Previous: formatValue(metric.previous, metric.unit),
                        Action: &#x27;Maintain strategy and scale&#x27;,
                        Note: `${metric.category} - Strong performance`
                    });
                });

                // Create workbook with multiple sheets
                const workbook = XLSX.utils.book_new();
                
                // Main data sheet
                const dataSheet = XLSX.utils.json_to_sheet(exportData);
                XLSX.utils.book_append_sheet(workbook, dataSheet, &#x27;Raw Data&#x27;);
                
                // Insights sheet
                const insightsSheet = XLSX.utils.json_to_sheet(insightsData);
                XLSX.utils.book_append_sheet(workbook, insightsSheet, &#x27;Insights &amp; Actions&#x27;);

                // Export file
                const fileName = `Dashboard_Analytics_Report_${new Date().toISOString().split(&#x27;T&#x27;)[0]}.xlsx`;
                XLSX.writeFile(workbook, fileName);
                
                showNotification(&#x27;Report đã được xuất thành công!&#x27;, &#x27;success&#x27;);
                
            } catch (error) {
                console.error(&#x27;Error exporting to Excel:&#x27;, error);
                showNotification(`Lỗi khi xuất Excel: ${error.message}`, &#x27;error&#x27;);
            }
        }
