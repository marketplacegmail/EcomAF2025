    &lt;script&gt;
        // Khởi tạo
        let productsDatabase = [];
        let historyVisible = false;
        
        window.onload = function() {
            setToday();
            setDefaultReportTime();
            loadProductsDatabase();
            loadHistory();
            updateStatsSummary();
        };

        function setDefaultReportTime() {
            const today = new Date();
            document.getElementById(&#x27;reportDate&#x27;).value = today.toISOString().split(&#x27;T&#x27;)[0];
            document.getElementById(&#x27;reportTime&#x27;).value = &#x27;19:30&#x27;;
        }

        function setToday() {
            const today = new Date().toISOString().split(&#x27;T&#x27;)[0];
            document.getElementById(&#x27;selectedDate&#x27;).value = today;
            loadDataForDate();
        }

        function loadProductsDatabase() {
            const saved = localStorage.getItem(&#x27;productsDatabase&#x27;);
            if (saved) {
                productsDatabase = JSON.parse(saved);
            }
        }

        function saveProductsDatabase() {
            localStorage.setItem(&#x27;productsDatabase&#x27;, JSON.stringify(productsDatabase));
        }

        function addProduct() {
            const codeInput = document.getElementById(&#x27;productCode&#x27;);
            const code = codeInput.value.trim();
            
            if (!code) {
                // Thay alert bằng thông báo showNotification
                showNotification(&#x27;❌ Vui lòng nhập mã sản phẩm!&#x27;);
                return;
            }

            if (productsDatabase.includes(code)) {
                showNotification(&#x27;ℹ️ Mã sản phẩm đã tồn tại!&#x27;);
                return;
            }

            productsDatabase.push(code);
            saveProductsDatabase();
            codeInput.value = &#x27;&#x27;;
            displayProducts();
            showNotification(&#x27;✅ Đã thêm sản phẩm: &#x27; + code);
        }

        function removeProduct(code) {
            // Thay confirm bằng custom logic hoặc mô phỏng confirm
            // Lưu ý: confirm() trên đây là cho phần Quản lý Sản phẩm, không phải Lịch sử
            if (confirm(&#x27;Bạn có chắc muốn xóa sản phẩm &#x27; + code + &#x27;?&#x27;)) {
                productsDatabase = productsDatabase.filter(p =&gt; p !== code);
                saveProductsDatabase();
                displayProducts();
                showNotification(&#x27;🗑️ Đã xóa sản phẩm: &#x27; + code);
            }
        }

        function displayProducts() {
            const listDiv = document.getElementById(&#x27;productList&#x27;);
            
            if (productsDatabase.length === 0) {
                listDiv.innerHTML = &#x27;&lt;div class=&quot;empty-state&quot;&gt;&lt;p&gt;Chưa có sản phẩm nào. Thêm mã sản phẩm để bắt đầu!&lt;/p&gt;&lt;/div&gt;&#x27;;
                return;
            }

            listDiv.innerHTML = productsDatabase.map(code =&gt; `
                &lt;div class=&quot;product-item&quot;&gt;
                    &lt;span&gt;&lt;strong&gt;${code}&lt;/strong&gt;&lt;/span&gt;
                    &lt;button onclick=&quot;removeProduct(&#x27;${code}&#x27;)&quot;&gt;Xóa&lt;/button&gt;
                &lt;/div&gt;
            `).join(&#x27;&#x27;);
        }

        function saveData() {
            const selectedDate = document.getElementById(&#x27;selectedDate&#x27;).value;
            
            if (!selectedDate) {
                showNotification(&#x27;❌ Vui lòng chọn ngày!&#x27;);
                return;
            }

            // Lấy dữ liệu mới từ Chat Info
            const chatInfo = document.getElementById(&#x27;chat-info-input&#x27;).value.trim();

            const data = {
                date: selectedDate,
                timestamp: new Date().toISOString(),
                channels: {
                    shopee: parseInt(document.getElementById(&#x27;shopee&#x27;).value) || 0,
                    lazada: parseInt(document.getElementById(&#x27;lazada&#x27;).value) || 0,
                    tiktok: parseInt(document.getElementById(&#x27;tiktok&#x27;).value) || 0,
                    tiki: parseInt(document.getElementById(&#x27;tiki&#x27;).value) || 0,
                    website: parseInt(document.getElementById(&#x27;website&#x27;).value) || 0,
                    mso: parseInt(document.getElementById(&#x27;mso&#x27;).value) || 0
                },
                products: [...productsDatabase],
                report: {
                    date: document.getElementById(&#x27;reportDate&#x27;).value || &#x27;&#x27;,
                    time: document.getElementById(&#x27;reportTime&#x27;).value || &#x27;&#x27;,
                    total: parseInt(document.getElementById(&#x27;totalOrders&#x27;).value) || 0,
                    processed: parseInt(document.getElementById(&#x27;processedOrders&#x27;).value) || 0,
                    pending: parseInt(document.getElementById(&#x27;pendingOrders&#x27;).value) || 0
                },
                // Thêm dữ liệu Chat Info
                chatInfo: chatInfo
            };

            // Lưu vào localStorage
            let history = JSON.parse(localStorage.getItem(&#x27;orderHistory&#x27;) || &#x27;{}&#x27;);
            history[selectedDate] = data;
            localStorage.setItem(&#x27;orderHistory&#x27;, JSON.stringify(history));

            showNotification(&#x27;💾 Đã lưu dữ liệu thành công!&#x27;);
            loadHistory();
            updateStatsSummary();
        }

        function loadDataForDate() {
            const selectedDate = document.getElementById(&#x27;selectedDate&#x27;).value;
            
            if (!selectedDate) {
                showNotification(&#x27;❌ Vui lòng chọn ngày!&#x27;);
                return;
            }

            const history = JSON.parse(localStorage.getItem(&#x27;orderHistory&#x27;) || &#x27;{}&#x27;);
            const data = history[selectedDate];

            if (data) {
                // Load channels data
                document.getElementById(&#x27;shopee&#x27;).value = data.channels.shopee || &#x27;&#x27;;
                document.getElementById(&#x27;lazada&#x27;).value = data.channels.lazada || &#x27;&#x27;;
                document.getElementById(&#x27;tiktok&#x27;).value = data.channels.tiktok || &#x27;&#x27;;
                document.getElementById(&#x27;tiki&#x27;).value = data.channels.tiki || &#x27;&#x27;;
                document.getElementById(&#x27;website&#x27;).value = data.channels.website || &#x27;&#x27;;
                document.getElementById(&#x27;mso&#x27;).value = data.channels.mso || &#x27;&#x27;;

                // Load report data
                document.getElementById(&#x27;reportDate&#x27;).value = data.report.date || &#x27;&#x27;;
                document.getElementById(&#x27;reportTime&#x27;).value = data.report.time || &#x27;&#x27;;
                document.getElementById(&#x27;totalOrders&#x27;).value = data.report.total || &#x27;&#x27;;
                document.getElementById(&#x27;processedOrders&#x27;).value = data.report.processed || &#x27;&#x27;;
                document.getElementById(&#x27;pendingOrders&#x27;).value = data.report.pending || &#x27;&#x27;;

                // Load Chat Info
                document.getElementById(&#x27;chat-info-input&#x27;).value = data.chatInfo || &#x27;&#x27;;

                showNotification(&#x27;📂 Đã tải dữ liệu ngày &#x27; + formatDate(selectedDate));
            } else {
                // Clear all fields
                clearAllFields();
                showNotification(&#x27;ℹ️ Chưa có dữ liệu cho ngày &#x27; + formatDate(selectedDate));
            }
        }

        function clearAllFields() {
            document.getElementById(&#x27;shopee&#x27;).value = &#x27;&#x27;;
            document.getElementById(&#x27;lazada&#x27;).value = &#x27;&#x27;;
            document.getElementById(&#x27;tiktok&#x27;).value = &#x27;&#x27;;
            document.getElementById(&#x27;tiki&#x27;).value = &#x27;&#x27;;
            document.getElementById(&#x27;website&#x27;).value = &#x27;&#x27;;
            document.getElementById(&#x27;mso&#x27;).value = &#x27;&#x27;;
            document.getElementById(&#x27;chat-info-input&#x27;).value = &#x27;&#x27;; // Clear chat info field
            setDefaultReportTime();
            document.getElementById(&#x27;totalOrders&#x27;).value = &#x27;&#x27;;
            document.getElementById(&#x27;processedOrders&#x27;).value = &#x27;&#x27;;
            document.getElementById(&#x27;pendingOrders&#x27;).value = &#x27;&#x27;;
        }

        function toggleHistoryList() {
            const historyList = document.getElementById(&#x27;historyList&#x27;);
            const toggleIcon = document.getElementById(&#x27;toggleIcon&#x27;);
            const toggleText = document.getElementById(&#x27;toggleText&#x27;);
            
            historyVisible = !historyVisible;
            
            if (historyVisible) {
                historyList.classList.add(&#x27;show&#x27;);
                toggleIcon.textContent = &#x27;▲&#x27;;
                toggleText.textContent = &#x27;Ẩn tất cả&#x27;;
                // Clear any specific date filter
                document.getElementById(&#x27;historyDate&#x27;).value = &#x27;&#x27;;
                loadHistory();
            } else {
                historyList.classList.remove(&#x27;show&#x27;);
                toggleIcon.textContent = &#x27;▼&#x27;;
                toggleText.textContent = &#x27;Hiển thị tất cả&#x27;;
            }
        }

        function viewSpecificDate() {
            const specificDate = document.getElementById(&#x27;historyDate&#x27;).value;
            
            if (!specificDate) {
                showNotification(&#x27;❌ Vui lòng chọn ngày để xem!&#x27;);
                return;
            }

            const history = JSON.parse(localStorage.getItem(&#x27;orderHistory&#x27;) || &#x27;{}&#x27;);
            const historyList = document.getElementById(&#x27;historyList&#x27;);
            
            if (!history[specificDate]) {
                historyList.innerHTML = &#x27;&lt;div class=&quot;empty-state&quot;&gt;&lt;p&gt;Không có dữ liệu cho ngày &#x27; + formatDate(specificDate) + &#x27;&lt;/p&gt;&lt;/div&gt;&#x27;;
                historyList.classList.add(&#x27;show&#x27;);
                historyVisible = true;
                document.getElementById(&#x27;toggleIcon&#x27;).textContent = &#x27;▲&#x27;;
                document.getElementById(&#x27;toggleText&#x27;).textContent = &#x27;Ẩn tất cả&#x27;;
                return;
            }

            // Display only the specific date
            displayHistoryItems([specificDate], history);
            historyList.classList.add(&#x27;show&#x27;);
            historyVisible = true;
            document.getElementById(&#x27;toggleIcon&#x27;).textContent = &#x27;▲&#x27;;
            document.getElementById(&#x27;toggleText&#x27;).textContent = &#x27;Ẩn tất cả&#x27;;
        }

        function clearHistoryFilter() {
            document.getElementById(&#x27;historyDate&#x27;).value = &#x27;&#x27;;
            loadHistory();
            if (historyVisible) {
                document.getElementById(&#x27;historyList&#x27;).classList.add(&#x27;show&#x27;);
            }
            showNotification(&#x27;🔄 Đã xóa bộ lọc&#x27;);
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem(&#x27;orderHistory&#x27;) || &#x27;{}&#x27;);
            const historyList = document.getElementById(&#x27;historyList&#x27;);
            const dates = Object.keys(history).sort().reverse();

            if (dates.length === 0) {
                historyList.innerHTML = &#x27;&lt;div class=&quot;empty-state&quot;&gt;&lt;p&gt;Chưa có dữ liệu lịch sử. Lưu dữ liệu để xem lịch sử!&lt;/p&gt;&lt;/div&gt;&#x27;;
                return;
            }

            displayHistoryItems(dates, history);
            displayProducts();
        }

        function displayHistoryItems(dates, history) {
            const historyList = document.getElementById(&#x27;historyList&#x27;);
            
            historyList.innerHTML = dates.map(date =&gt; {
                const data = history[date];
                const totalChannels = Object.values(data.channels).reduce((a, b) =&gt; a + b, 0);
                
                const reportDateTime = data.report.date &amp;&amp; data.report.time ? 
                    `📅 ${formatDate(data.report.date)} ⏰ ${data.report.time}` : 
                    &#x27;Chưa cập nhật&#x27;;
                
                const processRate = data.report.total &gt; 0 ? 
                    ((data.report.processed / data.report.total) * 100).toFixed(1) : &#x27;0&#x27;;
                
                const chatInfoText = data.chatInfo ? data.chatInfo : &#x27;Không có thông tin chat.&#x27;;

                return `
                    &lt;div class=&quot;history-item&quot;&gt;
                        &lt;div class=&quot;history-date&quot;&gt;📅 ${formatDate(date)}&lt;/div&gt;
                        &lt;div class=&quot;history-summary&quot;&gt;
                            &lt;div&gt;&lt;strong&gt;Tổng đơn chờ:&lt;/strong&gt; ${totalChannels}&lt;/div&gt;
                            &lt;div&gt;&lt;strong&gt;Tổng đơn đổi:&lt;/strong&gt; ${data.report.total}&lt;/div&gt;
                            &lt;div&gt;&lt;strong&gt;Đã xử lý:&lt;/strong&gt; ${data.report.processed}&lt;/div&gt;
                            &lt;div&gt;&lt;strong&gt;Chưa xử lý:&lt;/strong&gt; ${data.report.pending}&lt;/div&gt;
                            &lt;div&gt;&lt;strong&gt;Tỷ lệ xử lý:&lt;/strong&gt; ${processRate}%&lt;/div&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;history-detail&quot;&gt;
                            &lt;h4&gt;📦 Chi tiết đơn hàng theo kênh:&lt;/h4&gt;
                            &lt;div class=&quot;history-detail-grid&quot;&gt;
                                &lt;div&gt;&lt;strong&gt;🧡 Shopee:&lt;/strong&gt; ${data.channels.shopee}&lt;/div&gt;
                                &lt;div&gt;&lt;strong&gt;💙 Lazada:&lt;/strong&gt; ${data.channels.lazada}&lt;/div&gt;
                                &lt;div&gt;&lt;strong&gt;🎶 TikTok:&lt;/strong&gt; ${data.channels.tiktok}&lt;/div&gt;
                                &lt;div&gt;&lt;strong&gt;🛒 Tiki:&lt;/strong&gt; ${data.channels.tiki}&lt;/div&gt;
                                &lt;div&gt;&lt;strong&gt;🌐 Website:&lt;/strong&gt; ${data.channels.website}&lt;/div&gt;
                                &lt;div&gt;&lt;strong&gt;🫂 MSO:&lt;/strong&gt; ${data.channels.mso}&lt;/div&gt;
                            &lt;/div&gt;
                            &lt;div style=&quot;margin-top: 15px;&quot;&gt;
                                &lt;h4&gt;💬 Thông tin Chat:&lt;/h4&gt;
                                &lt;p style=&quot;white-space: pre-wrap; font-size: 0.9em; color: #555;&quot;&gt;${chatInfoText}&lt;/p&gt;
                            &lt;/div&gt;
                            &lt;div style=&quot;margin-top: 15px;&quot;&gt;
                                &lt;strong&gt;⏰ Thời gian báo cáo:&lt;/strong&gt; ${reportDateTime}
                            &lt;/div&gt;
                            &lt;div style=&quot;margin-top: 10px; display: flex; gap: 10px;&quot;&gt;
                                &lt;button onclick=&quot;loadHistoryDate(&#x27;${date}&#x27;)&quot; style=&quot;padding: 8px 15px; background: #4facfe; color: white; border: none; border-radius: 6px; cursor: pointer; font-family: Arial, sans-serif;&quot;&gt;
                                    📝 Chỉnh sửa
                                &lt;/button&gt;
                                &lt;button onclick=&quot;deleteHistoryDate(&#x27;${date}&#x27;)&quot; style=&quot;padding: 8px 15px; background: #ff4757; color: white; border: none; border-radius: 6px; cursor: pointer; font-family: Arial, sans-serif;&quot;&gt;
                                    🗑️ Xóa
                                &lt;/button&gt;
                            &lt;/div&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                `;
            }).join(&#x27;&#x27;);
        }

        function loadHistoryDate(date) {
            document.getElementById(&#x27;selectedDate&#x27;).value = date;
            loadDataForDate();
            window.scrollTo({ top: 0, behavior: &#x27;smooth&#x27; });
        }

        function deleteHistoryDate(date) {
            // Đã loại bỏ confirm() để nút hoạt động trong iFrame.
            let history = JSON.parse(localStorage.getItem(&#x27;orderHistory&#x27;) || &#x27;{}&#x27;);
            
            if (history[date]) {
                delete history[date];
                localStorage.setItem(&#x27;orderHistory&#x27;, JSON.stringify(history));
                loadHistory();
                updateStatsSummary();
                showNotification(&#x27;🗑️ Đã xóa dữ liệu ngày &#x27; + formatDate(date));
            } else {
                showNotification(&#x27;❌ Không tìm thấy dữ liệu để xóa.&#x27;);
            }
        }

        function updateStatsSummary() {
            const history = JSON.parse(localStorage.getItem(&#x27;orderHistory&#x27;) || &#x27;{}&#x27;);
            const dates = Object.keys(history);
            
            if (dates.length === 0) {
                document.getElementById(&#x27;statsSummary&#x27;).style.display = &#x27;none&#x27;;
                return;
            }

            document.getElementById(&#x27;statsSummary&#x27;).style.display = &#x27;grid&#x27;;

            let totalPending = 0;
            let totalReport = 0;
            let totalProcessed = 0;

            dates.forEach(date =&gt; {
                const data = history[date];
                totalPending += Object.values(data.channels).reduce((a, b) =&gt; a + b, 0);
                totalReport += data.report.total;
                totalProcessed += data.report.processed;
            });

            const avgProcessRate = totalReport &gt; 0 ? 
                ((totalProcessed / totalReport) * 100).toFixed(1) : &#x27;0&#x27;;

            document.getElementById(&#x27;totalDays&#x27;).textContent = dates.length;
            document.getElementById(&#x27;totalPendingOrders&#x27;).textContent = totalPending;
            document.getElementById(&#x27;totalReportOrders&#x27;).textContent = totalReport;
            document.getElementById(&#x27;avgProcessRate&#x27;).textContent = avgProcessRate + &#x27;%&#x27;;
        }

        function formatDate(dateString) {
            const date = new Date(dateString + &#x27;T00:00:00&#x27;);
            const days = [&#x27;Chủ Nhật&#x27;, &#x27;Thứ Hai&#x27;, &#x27;Thứ Ba&#x27;, &#x27;Thứ Tư&#x27;, &#x27;Thứ Năm&#x27;, &#x27;Thứ Sáu&#x27;, &#x27;Thứ Bảy&#x27;];
            return `${days[date.getDay()]}, ${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
        }

        function showNotification(message) {
            const notification = document.createElement(&#x27;div&#x27;);
            notification.className = &#x27;notification&#x27;;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() =&gt; {
                notification.remove();
            }, 3000);
        }

        function exportToExcel() {
            const history = JSON.parse(localStorage.getItem(&#x27;orderHistory&#x27;) || &#x27;{}&#x27;);
            const dates = Object.keys(history).sort();

            if (dates.length === 0) {
                showNotification(&#x27;❌ Chưa có dữ liệu để xuất!&#x27;);
                return;
            }

            // Tạo workbook với BOM UTF-8 cho Excel
            let csvContent = &#x27;\ufeff&#x27;;

            // Sheet 1: Tổng quan đơn hàng chờ xử lý
            csvContent += &#x27;=== TỔNG QUAN ĐƠN HÀNG CHỜ XỬ LÝ ===\n\n&#x27;;
            csvContent += &#x27;Ngày,Shopee,Lazada,TikTok,Tiki,Website,MSO,Tổng Cộng\n&#x27;;
            
            dates.forEach(date =&gt; {
                const data = history[date];
                const channels = data.channels;
                const total = Object.values(channels).reduce((a, b) =&gt; a + b, 0);
                csvContent += `${formatDateShort(date)},${channels.shopee},${channels.lazada},${channels.tiktok},${channels.tiki},${channels.website},${channels.mso},${total}\n`;
            });

            // Tính tổng cộng
            const totals = {
                shopee: 0,
                lazada: 0,
                tiktok: 0,
                tiki: 0,
                website: 0,
                mso: 0
            };

            dates.forEach(date =&gt; {
                const channels = history[date].channels;
                Object.keys(totals).forEach(key =&gt; {
                    totals[key] += channels[key];
                });
            });

            const grandTotal = Object.values(totals).reduce((a, b) =&gt; a + b, 0);
            csvContent += `TỔNG CỘNG,${totals.shopee},${totals.lazada},${totals.tiktok},${totals.tiki},${totals.website},${totals.mso},${grandTotal}\n`;

            // Sheet 2: Báo cáo đơn đổi
            csvContent += &#x27;\n\n=== BÁO CÁO ĐƠN ĐỔI ===\n\n&#x27;;
            csvContent += &#x27;Ngày,Thời Gian Báo Cáo,Tổng Số Đơn,Đã Xử Lý,Chưa Xử Lý,Tỷ Lệ Xử Lý (%)\n&#x27;;
            
            dates.forEach(date =&gt; {
                const data = history[date];
                const report = data.report;
                const reportDateTime = report.date &amp;&amp; report.time ? 
                    `${formatDateShort(report.date)} ${report.time}` : 
                    &#x27;Chưa cập nhật&#x27;;
                const processRate = report.total &gt; 0 ? 
                    ((report.processed / report.total) * 100).toFixed(1) : &#x27;0&#x27;;
                
                csvContent += `${formatDateShort(date)},${reportDateTime},${report.total},${report.processed},${report.pending},${processRate}%\n`;
            });

            // Tính tổng báo cáo
            let totalReportOrders = 0;
            let totalProcessed = 0;
            let totalPending = 0;

            dates.forEach(date =&gt; {
                const report = history[date].report;
                totalReportOrders += report.total;
                totalProcessed += report.processed;
                totalPending += report.pending;
            });

            const avgProcessRate = totalReportOrders &gt; 0 ? 
                ((totalProcessed / totalReportOrders) * 100).toFixed(1) : &#x27;0&#x27;;

            csvContent += `TỔNG CỘNG,,${totalReportOrders},${totalProcessed},${totalPending},${avgProcessRate}%\n`;

            // Sheet 3: Danh sách sản phẩm
            csvContent += &#x27;\n\n=== DANH SÁCH SẢN PHẨM ===\n\n&#x27;;
            csvContent += &#x27;STT,Mã Sản Phẩm\n&#x27;;
            
            productsDatabase.forEach((product, index) =&gt; {
                csvContent += `${index + 1},${product}\n`;
            });

            // Sheet 4: Thông tin Chat
            csvContent += &#x27;\n\n=== THÔNG TIN CHAT ===\n\n&#x27;;
            csvContent += &#x27;Ngày,Nội Dung Khách Hỏi Nhiều Nhất\n&#x27;;
            
            dates.forEach(date =&gt; {
                const data = history[date];
                const chatInfo = data.chatInfo ? data.chatInfo.replace(/\n/g, &#x27; | &#x27;) : &#x27;&#x27;; // Thay thế xuống dòng bằng | cho CSV
                csvContent += `${formatDateShort(date)},&quot;${chatInfo}&quot;\n`;
            });

            // Sheet 5: Phân tích theo kênh
            csvContent += &#x27;\n\n=== PHÂN TÍCH THEO KÊNH ===\n\n&#x27;;
            csvContent += &#x27;Kênh,Tổng Đơn,Trung Bình/Ngày,Tỷ Lệ (%)\n&#x27;;
            
            const channels = [&#x27;Shopee&#x27;, &#x27;Lazada&#x27;, &#x27;TikTok&#x27;, &#x27;Tiki&#x27;, &#x27;Website&#x27;, &#x27;MSO&#x27;];
            const channelKeys = [&#x27;shopee&#x27;, &#x27;lazada&#x27;, &#x27;tiktok&#x27;, &#x27;tiki&#x27;, &#x27;website&#x27;, &#x27;mso&#x27;];
            
            channelKeys.forEach((key, index) =&gt; {
                const total = totals[key];
                const avg = (total / dates.length).toFixed(1);
                const percentage = ((total / grandTotal) * 100).toFixed(1);
                csvContent += `${channels[index]},${total},${avg},${percentage}%\n`;
            });

            // Sheet 6: Chi tiết theo ngày
            csvContent += &#x27;\n\n=== CHI TIẾT THEO NGÀY ===\n\n&#x27;;
            
            dates.forEach(date =&gt; {
                const data = history[date];
                csvContent += `\n--- ${formatDateShort(date)} ---\n`;
                csvContent += &#x27;Đơn Hàng Chờ Xử Lý:\n&#x27;;
                csvContent += `  Shopee: ${data.channels.shopee}\n`;
                csvContent += `  Lazada: ${data.channels.lazada}\n`;
                csvContent += `  TikTok: ${data.channels.tiktok}\n`;
                csvContent += `  Tiki: ${data.channels.tiki}\n`;
                csvContent += `  Website: ${data.channels.website}\n`;
                csvContent += `  MSO: ${data.channels.mso}\n`;
                
                const reportDateTime = data.report.date &amp;&amp; data.report.time ? 
                    `${formatDateShort(data.report.date)} ${data.report.time}` : 
                    &#x27;Chưa cập nhật&#x27;;
                
                csvContent += `\nBáo Cáo Đơn Đổi (${reportDateTime}):\n`;
                csvContent += `  Tổng số đơn: ${data.report.total}\n`;
                csvContent += `  Đã xử lý: ${data.report.processed}\n`;
                csvContent += `  Chưa xử lý: ${data.report.pending}\n`;

                csvContent += `\nThông Tin Chat:\n`;
                csvContent += `  Nội dung: ${data.chatInfo || &#x27;Không có&#x27;}\n`;
            });

            // Tạo file và download
            const blob = new Blob([csvContent], { type: &#x27;text/csv;charset=utf-8;&#x27; });
            const link = document.createElement(&#x27;a&#x27;);
            const url = URL.createObjectURL(blob);
            
            const today = new Date();
            const filename = `ECommerce_Operation_Report_${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, &#x27;0&#x27;)}-${String(today.getDate()).padStart(2, &#x27;0&#x27;)}.csv`;
            
            link.setAttribute(&#x27;href&#x27;, url);
            link.setAttribute(&#x27;download&#x27;, filename);
            link.style.visibility = &#x27;hidden&#x27;;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showNotification(&#x27;📥 Đã tải xuống file Excel: &#x27; + filename);
        }

        function formatDateShort(dateString) {
            const date = new Date(dateString + &#x27;T00:00:00&#x27;);
            return `${String(date.getDate()).padStart(2, &#x27;0&#x27;)}/${String(date.getMonth() + 1).padStart(2, &#x27;0&#x27;)}/${date.getFullYear()}`;
        }
    &lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;"></iframe>
    </div>
    <script>
        const buttons = document.querySelectorAll('.tab-btn');
        const frames = document.querySelectorAll('.file-frame');
        buttons.forEach((btn) => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                frames.forEach(f => f.classList.remove('active'));
                document.getElementById(btn.dataset.target).classList.add('active');
            });
        });
        buttons[0].classList.add('active');
        frames[0].classList.add('active');
    </script>
</body>
